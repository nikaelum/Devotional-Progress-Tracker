<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>✝ Devotional Tracker</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/favicon.png?v=2">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<style
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Outfit',system-ui,sans-serif;--rad:20px;--rad-sm:12px;--rad-pill:50px;--glass-blur:blur(12px)}
[data-theme="light"]{--txt:#2C2825;--txt2:#6B635E;--txt3:#9E968F;--pri:#B89047;--pri-bg:rgba(184,144,71,0.1);--pri-lt:#d1b47b;--acc:#8BA8B8;--success:#6B8E6B;--warn:#C99A5C;--danger:#b85c5c;--card-bg:rgba(255,255,255,0.7);--card-brd:rgba(255,255,255,0.8);--input-bg:rgba(255,255,255,0.5);--sh-glow:0 8px 32px rgba(184,144,71,0.08);--bg-color:#F8F6F0}
[data-theme="dark"]{--txt:#F4F4F8;--txt2:#B8B5C6;--txt3:#7A758E;--pri:#C7A6FF;--pri-bg:rgba(199,166,255,0.15);--pri-lt:#a880eb;--acc:#FFB3D9;--success:#8DE0A6;--warn:#FFD275;--danger:#ff6b6b;--card-bg:rgba(20,15,35,0.6);--card-brd:rgba(255,255,255,0.1);--input-bg:rgba(0,0,0,0.4);--sh-glow:0 8px 32px rgba(199,166,255,0.15);--bg-color:#0A0612}
body{font-family:var(--font-sans);color:var(--txt);line-height:1.6;min-height:100vh;transition:color 0.5s ease;padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);-webkit-font-smoothing:antialiased}
[data-theme="light"] body{background:radial-gradient(circle at top left,#FFFFFF,#F4F1EA,#E8E2D5);background-attachment:fixed}
[data-theme="dark"] body{background-color:var(--bg-color);background-image:radial-gradient(1px 1px at 20px 30px,#fff,rgba(0,0,0,0)),radial-gradient(1.5px 1.5px at 40px 70px,#fff,rgba(0,0,0,0)),radial-gradient(1px 1px at 50px 160px,rgba(255,255,255,0.8),rgba(0,0,0,0)),radial-gradient(2px 2px at 90px 40px,#fff,rgba(0,0,0,0)),radial-gradient(1.5px 1.5px at 130px 80px,rgba(255,255,255,0.9),rgba(0,0,0,0)),radial-gradient(1px 1px at 160px 120px,#fff,rgba(0,0,0,0)),radial-gradient(circle at 15% 30%,rgba(95,44,130,0.3),transparent 40%),radial-gradient(circle at 85% 60%,rgba(73,160,157,0.15),transparent 40%),radial-gradient(circle at 50% 100%,rgba(201,75,126,0.2),transparent 50%),linear-gradient(to bottom,#05020A,#120A21);background-size:200px 200px,250px 250px,150px 150px,200px 200px,300px 300px,250px 250px,100% 100%,100% 100%,100% 100%,100% 100%;background-attachment:fixed}
h1,h2,h3,h4,.serif{font-family:var(--font-serif);font-weight:600}
.app-header{display:flex;justify-content:space-between;align-items:center;padding:32px 24px 16px;position:relative;z-index:10}
.header-titles h1{font-size:2.2rem;color:var(--txt);letter-spacing:0.5px}
.header-titles .subtitle{font-size:0.85rem;color:var(--txt2);font-weight:400;text-transform:uppercase;letter-spacing:2px;margin-top:-4px}
.header-controls{display:flex;gap:8px}
.theme-toggle,.kbd-toggle{background:var(--card-bg);border:1px solid var(--card-brd);color:var(--txt);width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:var(--glass-blur);box-shadow:var(--sh-glow)}
.theme-toggle:hover,.kbd-toggle:hover{transform:scale(1.05);color:var(--pri);border-color:var(--pri)}

/* Tab Nav - scrollable, fits all tabs */
.tab-nav {
  display: flex;
  background: var(--card-bg);
  border: 1px solid var(--card-brd);
  backdrop-filter: var(--glass-blur);
  position: fixed;
  bottom: env(safe-area-inset-bottom, 0px);
  left: 0;
  right: 0;
  z-index: 100;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  border-radius: 0;
  box-shadow: 0 -2px 20px rgba(0,0,0,0.08);
  padding: 4px 4px calc(4px + env(safe-area-inset-bottom, 0px)) 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  flex-wrap: nowrap;
  justify-content: flex-start;
  align-items: stretch;
  gap: 2px;
  scrollbar-width: none;          /* Firefox */
  -ms-overflow-style: none;       /* IE/Edge */
}

.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  flex: 0 0 auto;
  min-width: 60px;
  padding: 6px 10px 4px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 0.6rem;
  font-weight: 500;
  color: var(--txt2);
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  border-radius: 8px;
  font-family: inherit;
  text-transform: none;
  letter-spacing: 0.2px;
  white-space: nowrap;
  overflow: visible;
}

.tab-btn .tab-icon {
  font-size: 1.1rem;
  margin-bottom: 1px;
  transition: all 0.3s;
  filter: grayscale(100%) opacity(0.5);
}

.tab-btn.active {
  color: var(--pri);
  background: var(--pri-bg);
}

.tab-btn.active .tab-icon {
  filter: none;
  transform: scale(1.1);
  text-shadow: 0 0 10px var(--pri);
}

.main-content{max-width:700px;margin:0 auto;padding:0 20px calc(80px + env(safe-area-inset-bottom));position:relative;z-index:5}
.tab-panel{display:none;animation:floatUp 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards;opacity:0}
.tab-panel.active{display:block}
@keyframes floatUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.glass-card{background:var(--card-bg);border:1px solid var(--card-brd);border-radius:var(--rad);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);box-shadow:var(--sh-glow);margin-bottom:24px;transition:transform 0.3s,box-shadow 0.3s}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;margin-top:12px}
.section-title{font-size:1.6rem;color:var(--txt);display:flex;align-items:center;gap:8px}
.streak-banner{padding:16px 24px;display:flex;align-items:center;gap:16px;border-color:var(--pri);background:var(--pri-bg)}
.streak-banner.fire{border-color:var(--warn)}
.streak-banner .streak-flame{font-size:2rem}
.streak-banner .streak-info strong{color:var(--txt);font-size:1.1rem}
.streak-banner .streak-info p{font-size:0.85rem;color:var(--txt2);font-family:var(--font-sans)}
.streak-dismiss{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--txt3);margin-left:auto;transition:color 0.3s}
.streak-dismiss:hover{color:var(--txt)}
.votd-card{padding:32px;text-align:center;position:relative;overflow:hidden}
.votd-card::before{content:'✧';position:absolute;top:10px;left:15px;font-size:1.5rem;color:var(--pri);opacity:0.5}
.votd-card::after{content:'✧';position:absolute;bottom:10px;right:15px;font-size:1.5rem;color:var(--pri);opacity:0.5}
.votd-label{font-size:0.75rem;font-family:var(--font-sans);color:var(--pri);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.votd-text{font-size:1.6rem;line-height:1.4;margin-bottom:16px;font-style:italic}
.votd-ref{font-size:0.9rem;font-family:var(--font-sans);color:var(--txt2);letter-spacing:1px}
.votd-btn{margin-top:24px;padding:10px 24px;background:transparent;color:var(--txt);border:1px solid var(--pri);border-radius:var(--rad-pill);font-size:0.8rem;letter-spacing:1px;cursor:pointer;transition:all 0.3s;text-transform:uppercase}
.votd-btn:hover{background:var(--pri);color:#fff;box-shadow:0 0 15px var(--pri-bg)}
.entry-form-wrapper{padding:28px}
.form-group{margin-bottom:24px}
.form-group label{display:flex;align-items:center;gap:8px;font-size:0.85rem;font-family:var(--font-sans);color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
/* ===== NAV TOGGLE ===== */
.tab-nav {
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease;
  will-change: transform;
}

.tab-nav.nav-hidden {
  transform: translateY(calc(100% + 40px));
  opacity: 0;
  pointer-events: none;
}

.nav-pull-tab {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 5px;
  border-radius: 5px 5px 0 0;
  background: var(--txt3);
  opacity: 0;
  z-index: 101;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.nav-pull-tab.visible {
  opacity: 0.4;
}
input[type="text"],input[type="search"],textarea,select{width:100%;padding:16px;background:var(--input-bg);border:1px solid var(--card-brd);border-radius:var(--rad-sm);font-size:1rem;font-family:var(--font-sans);color:var(--txt);transition:all 0.3s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 10px var(--pri-bg)}
textarea{resize:vertical;min-height:90px}
.ref-row{display:flex;gap:8px}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--pri);color:#fff;border:none;border-radius:var(--rad-pill);padding:16px;font-size:1rem;letter-spacing:1px;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px var(--pri-bg);text-transform:uppercase;margin-top:8px;font-family:var(--font-sans)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--pri-bg)}
.fetch-btn{background:var(--pri-bg);color:var(--pri);border:1px solid var(--pri);padding:0 20px;border-radius:var(--rad-sm);cursor:pointer;transition:all 0.2s;font-family:var(--font-sans);text-transform:uppercase;font-size:0.8rem;letter-spacing:1px}
.fetch-btn:hover{background:var(--pri);color:#fff}
.fetch-btn:disabled{opacity:0.5;cursor:not-allowed}
.fetch-btn .spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-secondary{background:transparent;color:var(--pri);border:1px solid var(--pri);padding:12px 24px;border-radius:var(--rad-pill);cursor:pointer;transition:all 0.3s;font-family:var(--font-sans);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px}
.btn-secondary:hover{background:var(--pri);color:#fff}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:12px 24px;border-radius:var(--rad-pill);cursor:pointer;transition:all 0.3s;font-family:var(--font-sans);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-edit{background:transparent;color:var(--warn);border:1px solid var(--warn);padding:12px 24px;border-radius:var(--rad-pill);cursor:pointer;transition:all 0.3s;font-family:var(--font-sans);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px}
.btn-edit:hover{background:var(--warn);color:#fff}
.entry-layout{display:grid;grid-template-columns:1fr;gap:24px;align-items:start}
@media(min-width:900px){.entry-layout{grid-template-columns:280px 1fr}.soap-guide{position:sticky;top:24px}}
.soap-guide-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;text-align:center}
.soap-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.soap-circle{width:56px;height:56px;border-radius:50%;font-family:var(--font-serif);font-size:1.5rem;font-style:italic;display:flex;align-items:center;justify-content:center;color:var(--pri);border:1px solid var(--pri);background:var(--pri-bg)}
.soap-label{font-size:0.75rem;color:var(--txt2);text-transform:uppercase;letter-spacing:1px}
.soap-badge{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-style:italic;font-size:0.9rem;color:var(--pri);background:var(--pri-bg);border:1px solid var(--pri);flex-shrink:0}
.rte-wrapper{background:var(--input-bg);border:1px solid var(--card-brd);border-radius:var(--rad-sm);overflow:hidden;transition:all 0.3s}
.rte-wrapper:focus-within{border-color:var(--pri);box-shadow:0 0 10px var(--pri-bg)}
.rte-toolbar{display:flex;gap:6px;padding:8px;border-bottom:1px solid var(--card-brd)}
.rte-toolbar button{background:transparent;border:none;border-radius:4px;width:32px;height:32px;cursor:pointer;color:var(--txt);font-family:var(--font-serif);font-size:1.1rem;transition:background 0.2s}
.rte-toolbar button:hover{background:var(--pri-bg);color:var(--pri)}
.rte-editor{padding:16px;min-height:100px;outline:none;color:var(--txt);font-family:var(--font-serif);font-size:1.2rem;line-height:1.7}
.rte-editor:empty::before{content:attr(data-placeholder);color:var(--txt3);pointer-events:none;display:block;font-style:italic}
.rte-editor ul,.rte-editor ol{margin-left:20px;margin-bottom:6px}
.rte-editor li{margin-bottom:2px}
.tag-input-wrapper{display:flex;flex-wrap:wrap;gap:8px;padding:12px;border:1px solid var(--card-brd);border-radius:var(--rad-sm);background:var(--input-bg);min-height:54px;align-items:center;cursor:text;transition:all 0.3s}
.tag-input-wrapper:focus-within{border-color:var(--pri);box-shadow:0 0 10px var(--pri-bg)}
.tag-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--pri-bg);color:var(--pri);border:1px solid var(--pri);border-radius:var(--rad-pill);font-size:0.8rem;font-family:var(--font-sans);text-transform:uppercase;letter-spacing:1px}
.tag-pill button{background:none;border:none;color:inherit;cursor:pointer;font-size:1rem;opacity:0.7}
.tag-pill button:hover{opacity:1;color:var(--danger)}
.tag-input{border:none;outline:none;background:transparent;color:var(--txt);font-size:1rem;min-width:120px;flex:1;font-family:var(--font-sans)}
.img-upload-area{border:1px dashed var(--pri);background:var(--pri-bg);border-radius:var(--rad-sm);padding:32px;text-align:center;cursor:pointer;transition:all 0.3s;position:relative}
.img-upload-area:hover{background:var(--card-bg);border-style:solid}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-area p{color:var(--pri);font-family:var(--font-sans);font-size:0.9rem;letter-spacing:1px;text-transform:uppercase;margin-top:8px}
.img-preview{margin-top:16px;position:relative;display:inline-block;width:100%;text-align:center}
.img-preview img{max-width:100%;max-height:300px;border-radius:var(--rad-sm);border:1px solid var(--card-brd)}
.img-preview .remove-img{position:absolute;top:12px;right:12px;background:var(--danger);color:#fff;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem}
.word-count{display:flex;justify-content:flex-end;font-size:0.8rem;color:var(--txt3);margin-top:8px;gap:16px;font-family:var(--font-sans);text-transform:uppercase;letter-spacing:1px}
.word-count .wc-total{color:var(--pri);font-weight:600}
.journal-controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.journal-controls input,.journal-controls select{flex:1;min-width:150px;border-radius:var(--rad-pill);padding:12px 20px}
.journal-tag-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-tag{padding:6px 16px;border:1px solid var(--card-brd);background:var(--input-bg);border-radius:var(--rad-pill);font-size:0.75rem;cursor:pointer;color:var(--txt2);transition:all 0.3s;text-transform:uppercase;letter-spacing:1px}
.filter-tag.active{border-color:var(--pri);color:var(--pri);background:var(--pri-bg)}
.list-item{display:flex;align-items:center;gap:16px;padding:20px;text-decoration:none;color:inherit;cursor:pointer;position:relative}
.list-item:hover{transform:translateY(-2px);border-color:var(--pri)}
.list-icon{width:48px;height:48px;border-radius:50%;background:var(--pri-bg);border:1px solid var(--pri);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;color:var(--pri);font-family:var(--font-serif);font-style:italic}
.list-content{flex:1;min-width:0}
.list-title{font-size:1.3rem;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;padding-right:40px}
.list-subtitle{display:flex;gap:12px;font-size:0.75rem;color:var(--txt2);font-family:var(--font-sans);letter-spacing:0.5px;text-transform:uppercase;flex-wrap:wrap}
.list-value{font-size:0.85rem;color:var(--pri);font-family:var(--font-sans);letter-spacing:0.5px;border:1px solid var(--pri);background:var(--pri-bg);padding:4px 12px;border-radius:var(--rad-pill);margin-left:auto}
.list-preview{font-family:var(--font-serif);font-size:1.1rem;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:12px;font-style:italic}
.card-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.card-tag{padding:2px 10px;background:transparent;border:1px solid var(--pri);color:var(--pri);border-radius:var(--rad-pill);font-size:0.7rem;text-transform:uppercase;letter-spacing:1px}
.card-delete{position:absolute;top:16px;right:60px;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--txt3);opacity:0.4;transition:all 0.3s;z-index:2}
.card-delete:hover{opacity:1;color:var(--danger)}
.card-wc{display:inline;font-size:0.75rem;color:var(--txt3);font-family:var(--font-sans)}
.card-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;position:absolute;bottom:16px;right:16px;border:1px solid var(--card-brd)}
.fav-btn{position:absolute;top:20px;right:20px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--txt3);transition:all 0.3s;z-index:2}
.fav-btn.faved{color:var(--warn);text-shadow:0 0 10px var(--warn)}
.fav-btn:hover{transform:scale(1.1)}
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3);font-family:var(--font-sans)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:16px;display:block;opacity:0.5;filter:grayscale(1)}
.empty-state p{font-size:1.2rem;font-family:var(--font-serif);font-style:italic}
.segmented-control{background:var(--input-bg);border:1px solid var(--card-brd);display:inline-flex;padding:4px;border-radius:var(--rad-pill);margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.segmented-btn{padding:8px 24px;border:none;background:transparent;color:var(--txt2);font-size:0.8rem;font-family:var(--font-sans);letter-spacing:1px;text-transform:uppercase;border-radius:var(--rad-pill);cursor:pointer;transition:all 0.3s}
.segmented-btn.active{background:var(--pri);color:#fff;box-shadow:0 4px 10px var(--pri-bg)}
.stats-header{text-align:center;margin-bottom:24px;padding:32px 20px}
.stats-header p{color:var(--txt2);font-size:0.85rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.stats-header h2{font-size:4rem;color:var(--pri);line-height:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;margin-bottom:24px}
.stat-card{padding:24px 16px;text-align:center}
.stat-card .stat-icon{font-size:1.5rem;margin-bottom:8px;opacity:0.7}
.stat-card .stat-value{font-size:2rem;font-family:var(--font-serif);color:var(--pri);line-height:1.2;font-weight:600}
.stat-card .stat-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt2);margin-top:4px}
.chart-legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-bottom:12px;font-size:0.72rem;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-sans)}
.legend-boxes{display:flex;gap:3px}
.legend-box{width:14px;height:14px;border-radius:3px}
.legend-box.l-0{background:var(--card-brd)}
.legend-box.l-1{background:var(--pri-bg)}
.legend-box.l-2{background:var(--pri-lt)}
.legend-box.l-3{background:var(--pri);box-shadow:0 0 8px var(--pri)}
.time-bars{display:flex;align-items:flex-end;justify-content:space-between;height:160px;padding:20px 0}
.time-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;flex:1}
.time-bar-track{width:6px;flex:1;background:var(--card-brd);border-radius:10px;position:relative;display:flex;align-items:flex-end;justify-content:center}

.time-insight{text-align:center;font-family:var(--font-serif);font-size:1.1rem;font-style:italic;color:var(--txt2);margin-top:16px}

.heatmap-cell .cell-tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--card-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--pri);color:var(--txt);padding:8px 12px;border-radius:var(--rad-sm);font-size:0.75rem;white-space:nowrap;z-index:10;box-shadow:var(--sh-glow);font-family:var(--font-sans);letter-spacing:0.5px}

.achievements-overview{text-align:center;padding:32px}
.ach-count{font-size:3.5rem;font-family:var(--font-serif);color:var(--pri);line-height:1}
.ach-total{font-size:0.85rem;color:var(--txt2);text-transform:uppercase;letter-spacing:2px}
.ach-progress-bar{width:100%;max-width:400px;height:6px;background:var(--card-brd);border-radius:10px;margin:24px auto 0;overflow:hidden}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

.data-mgmt-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.toast-container{position:fixed;top:calc(24px + env(safe-area-inset-top));right:24px;z-index:2000;display:flex;flex-direction:column;gap:12px}
.toast{padding:16px 24px;border-radius:var(--rad-pill);font-size:0.85rem;font-family:var(--font-sans);text-transform:uppercase;letter-spacing:1px;font-weight:500;color:#fff;box-shadow:var(--sh-glow);animation:toastIn 0.4s cubic-bezier(0.16,1,0.3,1),toastOut 0.4s 3s forwards;display:flex;align-items:center;gap:12px;backdrop-filter:var(--glass-blur);border:1px solid rgba(255,255,255,0.2)}

.toast.error{background:rgba(184,92,92,0.9)}
.toast.info{background:rgba(139,168,184,0.9)}

.ach-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:3000;align-items:center;justify-content:center;backdrop-filter:blur(10px)}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ach-popup-content h3{font-size:0.8rem;color:var(--warn);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;font-family:var(--font-sans)}
.ach-popup-content h4{font-size:2rem;font-family:var(--font-serif);color:var(--txt);margin-bottom:8px}
.ach-popup-content p{font-size:0.9rem;color:var(--txt2);margin-bottom:32px}
.chat-fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:var(--card-bg);border:1px solid var(--pri);color:var(--pri);box-shadow:var(--sh-glow);font-size:1.3rem;cursor:pointer;z-index:901;transition:all 0.3s;display:flex;align-items:center;justify-content:center;backdrop-filter:var(--glass-blur)}

.chat-badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;width:20px;height:20px;border-radius:50%;font-size:0.7rem;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;border:2px solid var(--bg-color);animation:popIn 0.3s ease}

.chat-header{background:var(--pri-bg);border-bottom:1px solid var(--pri);color:var(--pri);padding:16px 20px;font-family:var(--font-sans);font-size:0.85rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;display:flex;justify-content:space-between;align-items:center}

.kbd-help .kbd-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}

/* New Elements */
.chat-tab-container { display: flex; flex-direction: column; height: calc(100vh - 280px); min-height: 400px; }
.chat-tab-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--input-bg); border-radius: var(--rad-sm); border: 1px solid var(--card-brd); margin-bottom: 16px; }
.general-date-time { text-align: center; color: var(--txt2); font-size: 0.95rem; margin-bottom: 24px; font-style: italic; font-family: var(--font-serif); border-bottom: 1px solid var(--card-brd); padding-bottom: 12px; }

/* ============================================================
   ENHANCED ANIMATIONS
   ============================================================ */

/* --- Respect reduced motion --- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* --- Keyframes --- */
@keyframes floatUpStagger { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeScaleIn    { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
@keyframes shimmer        { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
@keyframes pulseRing      { 0% { box-shadow: 0 0 0 0 rgba(var(--pri-rgb, 184,144,71), 0.35); } 70% { box-shadow: 0 0 0 10px rgba(var(--pri-rgb, 184,144,71), 0); } 100% { box-shadow: 0 0 0 0 rgba(var(--pri-rgb, 184,144,71), 0); } }
@keyframes iconBounce     { 0%, 100% { transform: translateY(0) scale(1); } 40% { transform: translateY(-6px) scale(1.15); } 60% { transform: translateY(-3px) scale(1.08); } }
@keyframes streakFlame    { 0%, 100% { transform: scale(1) rotate(-3deg); } 50% { transform: scale(1.12) rotate(3deg); } }
@keyframes votdReveal     { from { opacity: 0; transform: translateY(12px); letter-spacing: -1px; } to { opacity: 1; transform: translateY(0); letter-spacing: normal; } }
@keyframes cardSlideIn    { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
@keyframes checkPop       { 0% { transform: scale(1); } 30% { transform: scale(1.35); } 60% { transform: scale(0.9); } 100% { transform: scale(1); } }
@keyframes fabFloat       { 0%, 100% { transform: translateY(0); box-shadow: var(--sh-glow); } 50% { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(184,144,71,0.18); } }
@keyframes tabNavEnter    { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes progressFill   { from { width: 0; } }
@keyframes countUp        { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes ripple         { from { transform: scale(0); opacity: 0.5; } to { transform: scale(4); opacity: 0; } }
@keyframes headerEntrance { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes glowPulse      { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
@keyframes toastSlideIn   { from { opacity: 0; transform: translateX(100%) scale(0.9); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes toastSlideOut  { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(100%) scale(0.9); } }
@keyframes modalSlideUp   { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes overlayFadeIn  { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(8px); } }
@keyframes msgPop         { from { opacity: 0; transform: translateY(10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes achUnlock      { 0% { transform: scale(0.7) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.1) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
@keyframes draftPulse     { 0%, 100% { border-color: var(--pri); } 50% { border-color: var(--warn); box-shadow: 0 0 12px rgba(201,154,92,0.3); } }
@keyframes tagAppear      { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
@keyframes statReveal     { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* --- Header entrance --- */
.app-header {
  animation: headerEntrance 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
.app-header .header-titles h1 { animation: headerEntrance 0.6s 0.08s cubic-bezier(0.2,0.8,0.2,1) both; }
.app-header .header-titles .subtitle { animation: headerEntrance 0.6s 0.16s cubic-bezier(0.2,0.8,0.2,1) both; }
.header-controls .kbd-toggle  { animation: fadeScaleIn 0.4s 0.2s cubic-bezier(0.2,0.8,0.2,1) both; }
.header-controls .theme-toggle { animation: fadeScaleIn 0.4s 0.28s cubic-bezier(0.2,0.8,0.2,1) both; }

/* --- Tab nav entrance --- */
.tab-nav { animation: tabNavEnter 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) both; }

/* --- Tab button press ripple --- */
.tab-btn { position: relative; overflow: hidden; }
.tab-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  background: radial-gradient(circle, var(--pri-bg) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.tab-btn:active::after { opacity: 1; }
.tab-btn.active .tab-icon { animation: iconBounce 0.5s cubic-bezier(0.2,0.8,0.2,1); }

/* --- Tab panel transitions --- */
.tab-panel { animation: floatUpStagger 0.55s cubic-bezier(0.2,0.8,0.2,1) both; }

/* --- Glass cards stagger on entry --- */
.tab-panel.active .glass-card {
  animation: floatUpStagger 0.5s cubic-bezier(0.2,0.8,0.2,1) both;
}
.tab-panel.active .glass-card:nth-child(1) { animation-delay: 0.04s; }
.tab-panel.active .glass-card:nth-child(2) { animation-delay: 0.1s; }
.tab-panel.active .glass-card:nth-child(3) { animation-delay: 0.16s; }
.tab-panel.active .glass-card:nth-child(4) { animation-delay: 0.22s; }
.tab-panel.active .glass-card:nth-child(5) { animation-delay: 0.28s; }

/* --- Glass card hover lift --- */
.glass-card {
  transition: transform 0.28s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.28s cubic-bezier(0.2,0.8,0.2,1), border-color 0.28s;
  will-change: transform;
}
.glass-card:hover {
  transform: translateY(-3px) scale(1.005);
  box-shadow: 0 16px 48px rgba(184,144,71,0.13);
  border-color: rgba(184,144,71,0.3);
}

/* --- VOTD verse shimmer reveal --- */
.votd-card { animation: fadeScaleIn 0.7s cubic-bezier(0.2,0.8,0.2,1) both; }
.votd-text  { animation: votdReveal 0.9s 0.2s cubic-bezier(0.2,0.8,0.2,1) both; }
.votd-ref   { animation: votdReveal 0.7s 0.45s cubic-bezier(0.2,0.8,0.2,1) both; }
.votd-btn   { animation: fadeScaleIn 0.5s 0.65s cubic-bezier(0.2,0.8,0.2,1) both; }
.votd-card::before, .votd-card::after { animation: glowPulse 3s ease-in-out infinite; }

/* --- Streak banner --- */
.streak-banner { animation: cardSlideIn 0.5s cubic-bezier(0.2,0.8,0.2,1) both; }
.streak-banner .streak-flame { animation: streakFlame 1.6s ease-in-out infinite; display: inline-block; }

/* --- Draft indicator pulse --- */
.draft-indicator { animation: draftPulse 2.5s ease-in-out infinite; }

/* --- Buttons: ripple on tap --- */
.btn-primary, .btn-secondary, .btn-danger, .btn-edit, .fetch-btn, .votd-btn {
  position: relative;
  overflow: hidden;
}
.btn-primary::after, .btn-secondary::after, .btn-danger::after, .btn-edit::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0; left: 0;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
  transform: scale(0);
  opacity: 0;
  border-radius: inherit;
  transition: transform 0.5s, opacity 0.5s;
}
.btn-primary:active::after, .btn-secondary:active::after,
.btn-danger:active::after, .btn-edit:active::after {
  transform: scale(2.5);
  opacity: 1;
  transition: 0s;
}
.btn-primary:active { transform: translateY(1px) scale(0.98); }
.btn-secondary:active, .btn-danger:active, .btn-edit:active { transform: scale(0.97); }

/* --- Form inputs focus glow --- */
input[type="text"]:focus, input[type="search"]:focus, textarea:focus, select:focus {
  transform: translateY(-1px);
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
}

/* --- Tag pills pop in --- */
.tag-pill { animation: tagAppear 0.25s cubic-bezier(0.34,1.56,0.64,1) both; }

/* --- Journal list items stagger --- */
#journalList .glass-card, #generalList .glass-card {
  animation: cardSlideIn 0.4s cubic-bezier(0.2,0.8,0.2,1) both;
}

/* --- List item hover --- */
.list-item { transition: transform 0.25s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.25s; }
.list-item:active { transform: scale(0.98); }

/* --- Stats numbers reveal --- */
.stat-card { animation: statReveal 0.5s cubic-bezier(0.2,0.8,0.2,1) both; }
.stat-card:nth-child(1) { animation-delay: 0.05s; }
.stat-card:nth-child(2) { animation-delay: 0.12s; }
.stat-card:nth-child(3) { animation-delay: 0.19s; }
.stat-card:nth-child(4) { animation-delay: 0.26s; }
.stat-card .stat-value  { animation: countUp 0.6s 0.3s cubic-bezier(0.2,0.8,0.2,1) both; }

/* --- Progress / achievement bars animate width --- */
.ach-prog-fill, .ach-progress-fill, .time-bar-fill {
  animation: progressFill 1s cubic-bezier(0.4,0,0.2,1) both;
}

/* --- Achievement card unlocked glow --- */
.ach-card.unlocked {
  animation: fadeScaleIn 0.45s cubic-bezier(0.2,0.8,0.2,1) both;
  transition: transform 0.28s, box-shadow 0.28s;
}
.ach-card.unlocked:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 36px rgba(184,144,71,0.18); }
.ach-card.locked { transition: opacity 0.3s, filter 0.3s; }
.ach-card.locked:hover { opacity: 0.8; filter: grayscale(0.5); }
.ach-icon { transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.ach-card.unlocked:hover .ach-icon { transform: scale(1.2) rotate(8deg); }

/* --- Achievement popup --- */
.ach-popup-content { animation: achUnlock 0.6s cubic-bezier(0.17,0.67,0.42,1.2) both; }
.ach-popup-icon    { animation: bounce 2s ease infinite, iconBounce 0.6s 0.2s cubic-bezier(0.2,0.8,0.2,1); }

/* --- Modal overlay & content --- */
.modal-overlay { animation: overlayFadeIn 0.3s ease both; transition: opacity 0.3s; }
.modal-content { animation: modalSlideUp 0.42s cubic-bezier(0.16,1,0.3,1) both; }

/* --- Toast notifications --- */
.toast { animation: toastSlideIn 0.4s cubic-bezier(0.16,1,0.3,1) both, toastSlideOut 0.4s 3s cubic-bezier(0.4,0,1,1) forwards; }

/* --- FAB idle float --- */
.chat-fab { animation: fabFloat 3.5s ease-in-out infinite; }
.chat-fab:hover { animation: none; transform: scale(1.12) rotate(12deg); background: var(--pri); color: #fff; }
.chat-fab:active { transform: scale(0.94); animation: none; }

/* --- Chat messages pop in --- */
.chat-msg { animation: msgPop 0.3s cubic-bezier(0.2,0.8,0.2,1) both; }
.chat-msg.user { transform-origin: right bottom; }
.chat-msg.ai   { transform-origin: left bottom; }

/* --- Prayer checkbox checked pop --- */
.prayer-checkbox.checked { animation: checkPop 0.35s cubic-bezier(0.34,1.56,0.64,1); }

/* --- Prayer item answered cross-out transition --- */
.prayer-item .list-title { transition: text-decoration 0.3s, color 0.3s; }

/* --- Filter tag transition --- */
.filter-tag { transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.2s; }
.filter-tag:active { transform: scale(0.95); }

/* --- Segmented control active slide --- */
.segmented-btn { transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.2s; }
.segmented-btn:active { transform: scale(0.96); }

/* --- Theme toggle spin --- */
.theme-toggle { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), color 0.3s, border-color 0.3s; }
.theme-toggle:active { transform: scale(0.9) rotate(-30deg); }
.theme-toggle.spinning { animation: spin 0.5s cubic-bezier(0.4,0,0.2,1); }

/* --- SOAP circles hover pulse --- */
.soap-circle { transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s; }
.soap-circle:hover { transform: scale(1.1); box-shadow: 0 0 16px var(--pri-bg); }

/* --- Cloud words hover --- */
.cloud-word { transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s; }
.cloud-word:hover { transform: scale(1.18) rotate(-2deg); }

/* --- Chat panel open animation --- */
.study-chat { transform-origin: bottom right; }

/* --- Heatmap cell hover enhanced --- */
.heatmap-cell { transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s; }
.heatmap-cell:hover { transform: scale(1.5); }

/* --- Time bar fill animation --- */
.time-bar-fill { transition: height 1s cubic-bezier(0.4,0,0.2,1); }

/* --- Image upload area hover --- */
.img-upload-area { transition: background 0.3s, border-style 0.3s, transform 0.2s; }
.img-upload-area:hover { transform: scale(1.01); }
.img-upload-area:active { transform: scale(0.99); }

/* --- Prayer add btn ripple --- */
.prayer-add-btn { transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.prayer-add-btn:active { transform: scale(0.9) rotate(-20deg); }

@media(max-width:480px){
  .study-chat{width:calc(100vw - 32px);right:16px;bottom:calc(120px + env(safe-area-inset-bottom))}
  .chat-fab{right:16px;bottom:calc(70px + env(safe-area-inset-bottom));width:48px;height:48px;font-size:1.2rem}
  .app-header{padding:24px 16px 12px}
  .header-titles h1{font-size:1.8rem}
  .tab-btn{font-size:0.55rem;letter-spacing:0.1px;padding:5px 8px 3px;min-width:52px}
  .tab-btn .tab-icon{font-size:1rem}
}
</style>
</head>
<body>
<div id="app">
<header class="app-header">
<div class="header-titles"><h1 class="serif">Devotions</h1><p class="subtitle">Walk faithfully · Grow daily</p></div>
<div class="header-controls">
<button class="kbd-toggle" onclick="toggleKbdHelp()" title="Keyboard Shortcuts">⌨</button>
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme">🕊</button>
</div>
</header>
<main class="main-content">
<section id="tab-new-entry" class="tab-panel active" role="tabpanel">
<div id="streakBanner"></div>
<div id="votdCard" class="glass-card votd-card" style="display:none">
<div class="votd-label">Verse of the Day</div>
<div class="votd-text serif" id="votdText"></div>
<div class="votd-ref" id="votdRef"></div>
<button class="votd-btn" onclick="useVotd()">Reflect on this</button>
</div>
<div id="draftIndicator" class="draft-indicator" style="display:none">
<span>✧ Unsaved draft restored.</span>
<button onclick="discardDraft()">Discard</button>
</div>
<div class="entry-layout">
<aside class="soap-guide">
<div class="section-header" style="margin-top:0"><h2 class="section-title serif" id="guideTitle">The Method</h2></div>
<div class="soap-guide-grid" id="guideBody"></div>
</aside>
<div class="glass-card entry-form-wrapper">
<h2 class="serif" id="formHeading" style="font-size:1.8rem;margin-bottom:24px">New Devotion</h2>
<div class="form-group" style="margin-bottom:32px">
<label for="entryMode">Template</label>
<select id="entryMode" onchange="switchMode()">
<option value="soap">SOAP Method</option>
<option value="hear">H.E.A.R. Method</option>
<option value="free">Free Write</option>
</select>
</div>
<form id="entryForm" onsubmit="saveEntry(event)">
<input type="hidden" id="editingId" value="">
<div class="form-group"><label for="entryTitle">Title</label><input type="text" id="entryTitle" placeholder="e.g., Finding Peace in the Storm" required></div>
<div class="form-group"><label for="entryRef">Reference</label><div class="ref-row"><input type="text" id="entryRef" placeholder="e.g., John 3:16"><button type="button" class="fetch-btn" onclick="fetchScripture()" id="fetchBtn">Fetch</button></div></div>
<div id="dynamicFields"></div>
<div class="form-group"><label>Tags</label><div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tagInput').focus()"><input type="text" class="tag-input" id="tagInput" placeholder="Add a tag..." onkeydown="handleTagKey(event)"></div></div>
<div class="form-group"><label>Inspiration Image</label>
<div class="img-upload-area" id="imgUploadArea"><input type="file" accept="image/*" onchange="handleImageUpload(event)" id="imgInput"><div style="font-size:2rem;color:var(--pri)">✧</div><p>Tap to attach a photo</p></div>
<div id="imgPreview" class="img-preview" style="display:none"><img id="imgPreviewImg" src="" alt="preview"><button type="button" class="remove-img" onclick="removeImage()">✕</button></div>
</div>
<div class="word-count" id="totalWordCount"></div>
<button type="submit" class="btn-primary" id="submitBtn">Save Entry</button>
<button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none;width:100%;margin-top:16px" onclick="cancelEdit()">Cancel Editing</button>
</form>
</div>
</div>
</section>

<!-- TAB: General Journal -->
<section id="tab-general" class="tab-panel" role="tabpanel">
    <div class="glass-card entry-form-wrapper">
        <h2 class="serif" style="font-size:2rem;text-align:center;margin-bottom:8px;color:var(--pri)">Diary</h2>
        <div id="generalDateTime" class="general-date-time"></div>
        <form id="generalForm" onsubmit="saveGeneralEntry(event)">
            <div class="form-group">
                <input type="text" id="generalTitle" placeholder="Title your thoughts..." required style="font-size: 1.2rem; font-family: var(--font-serif); font-weight: 600;">
            </div>
            <div class="form-group">
                <div class="rte-wrapper">
                    <div class="rte-toolbar">
                        <button type="button" onmousedown="event.preventDefault()" onclick="rteCmd('bold')">B</button>
                        <button type="button" onmousedown="event.preventDefault()" onclick="rteCmd('italic')" style="font-style:italic">I</button>
                        <button type="button" onmousedown="event.preventDefault()" onclick="rteCmd('underline')" style="text-decoration:underline">U</button>
                        <button type="button" onmousedown="event.preventDefault()" onclick="rteCmd('insertUnorderedList')">•</button>
                        <button type="button" class="mic-btn" style="margin-left:auto; color: var(--pri);" onmousedown="event.preventDefault()" onclick="toggleRecording(this, 'generalBody')" title="Voice Type">🎙️</button>
                    </div>
                    <div class="rte-editor" contenteditable="true" id="generalBody" data-placeholder="What is on your heart today?" style="min-height: 250px;" oninput="updateWordCount()"></div>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 16px;">Save Entry</button>
        </form>
    </div>
</section>

<section id="tab-journal" class="tab-panel" role="tabpanel">
<div class="section-header"><h2 class="section-title serif">Chronicles</h2></div>
<div class="journal-controls">
<input type="search" id="journalSearch" placeholder="Search entries..." oninput="renderJournal()">
<select id="journalMode" onchange="renderJournal()">
    <option value="all">All Templates</option>
    <option value="soap">SOAP</option>
    <option value="hear">H.E.A.R.</option>
    <option value="free">Free Write</option>
    <option value="general">General Journal</option>
</select>
<select id="journalSort" onchange="renderJournal()"><option value="newest">Newest First</option><option value="oldest">Oldest First</option><option value="favorites">Bookmarks First</option></select>
</div>
<div id="journalTagFilters" class="journal-tag-filters"></div>
<div id="journalList"></div>
<div id="emptyJournal" class="empty-state" style="display:none"><span class="empty-icon">✧</span><p>Your journal is empty.</p></div>
</section>

<section id="tab-progress" class="tab-panel" role="tabpanel">
<div class="glass-card stats-header"><p>Words of Devotion</p><h2 class="serif" id="statWords">0</h2></div>
<div class="stats-grid">
<div class="glass-card stat-card"><div class="stat-icon">✧</div><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
<div class="glass-card stat-card"><div class="stat-icon">🔥</div><div class="stat-value" id="statStreak">0</div><div class="stat-label">Streak</div></div>
<div class="glass-card stat-card"><div class="stat-icon">🏆</div><div class="stat-value" id="statLongest">0</div><div class="stat-label">Best</div></div>
<div class="glass-card stat-card"><div class="stat-icon">📅</div><div class="stat-value" id="statMonth">0</div><div class="stat-label">Month</div></div>
</div>
<div class="glass-card" style="padding:24px">
<div class="section-header" style="margin-top:0"><h2 class="section-title serif">Activity Heatmap</h2></div>
<div class="chart-legend"><span>Less</span><div class="legend-boxes"><div class="legend-box l-0"></div><div class="legend-box l-1"></div><div class="legend-box l-2"></div><div class="legend-box l-3"></div></div><span>More</span></div>
<div class="heatmap-wrapper" id="heatmapWrapper"></div>
</div>
<div class="glass-card" style="padding:24px">
<div class="section-header" style="margin-top:0"><h2 class="section-title serif">Time of Day</h2></div>
<div id="timeBars" class="time-bars"></div>
<div id="timeInsight" class="time-insight"></div>
</div>
<div class="section-header" style="margin-top:32px"><h2 class="section-title serif">Themes & Thoughts</h2></div>
<div class="word-clouds-dual">
<div class="glass-card word-cloud-panel"><h4>What God is Saying</h4><div id="wordCloudGod" class="word-cloud"></div></div>
<div class="glass-card word-cloud-panel"><h4>My Heart</h4><div id="wordCloudHeart" class="word-cloud"></div></div>
</div>
<div class="section-header" style="margin-top:32px"><h2 class="section-title serif">Recent Reflections</h2></div>
<div id="activityList"></div>
<div id="emptyActivity" class="empty-state" style="display:none"><p>No recent activity</p></div>
<div class="glass-card" style="padding:32px;text-align:center;margin-top:32px">
<h2 class="section-title serif" style="justify-content:center">Data Management</h2>
<p style="font-size:0.85rem;color:var(--txt2);margin-bottom:24px">Export, import, or clear your spiritual journey.</p>
<div class="data-mgmt-btns">
<button class="btn-secondary" onclick="exportData()">Export Backup</button>
<label class="btn-secondary" style="cursor:pointer;display:inline-block">Import Backup<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
<button class="btn-danger" onclick="clearAllData()">Clear All Data</button>
</div>
</div>
</section>

<!-- TAB: Dedicated Chat -->
<section id="tab-chat" class="tab-panel" role="tabpanel">
    <div class="section-header">
        <h2 class="section-title serif">AI Study Buddy</h2>
        <button class="btn-secondary" style="padding: 6px 12px; font-size: 0.75rem; border-color: var(--danger); color: var(--danger);" onclick="clearChat()">🗑 Clear</button>
    </div>
    <div class="chat-tab-container">
        <div class="chat-tab-messages" id="tabChatMessages"></div>
        <div class="chat-input-row" style="border-radius: var(--rad-sm); border: 1px solid var(--card-brd);">
            <input type="text" id="tabChatInput" placeholder="Ask for insight..." onkeydown="if(event.key==='Enter'){event.preventDefault();handleSendChat('tabChatInput')}">
            <button type="button" class="btn-primary" style="width:auto;padding:12px 20px" onclick="handleSendChat('tabChatInput')" id="tabChatSendBtn">Ask</button>
        </div>
    </div>
</section>

<section id="tab-prayers" class="tab-panel" role="tabpanel">
<div class="section-header"><h2 class="section-title serif">Petitions & Thanks</h2></div>
<div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
<div class="glass-card stat-card" style="padding:16px"><div class="stat-value" id="prayerTotal">0</div><div class="stat-label">Total</div></div>
<div class="glass-card stat-card" style="padding:16px"><div class="stat-value" id="prayerActive">0</div><div class="stat-label">Active</div></div>
<div class="glass-card stat-card" style="padding:16px"><div class="stat-value" id="prayerAnswered">0</div><div class="stat-label">Answered</div></div>
</div>
<div class="prayer-input-container">
<input type="text" id="prayerInput" placeholder="Add a new prayer request..." onkeydown="if(event.key==='Enter'){event.preventDefault();addPrayer()}">
<button class="prayer-add-btn" onclick="addPrayer()">+</button>
</div>
<div style="text-align:center"><div class="segmented-control">
<button class="segmented-btn prayer-filter-btn active" onclick="setPrayerFilter('all',this)">All</button>
<button class="segmented-btn prayer-filter-btn" onclick="setPrayerFilter('active',this)">Active</button>
<button class="segmented-btn prayer-filter-btn" onclick="setPrayerFilter('answered',this)">Answered</button>
</div></div>
<div id="prayerList"></div>
<div id="emptyPrayers" class="empty-state" style="display:none"><span class="empty-icon">✧</span><p>No prayer requests yet.</p></div>
</section>

<section id="tab-achievements" class="tab-panel" role="tabpanel">
<div class="glass-card achievements-overview">
<h2 class="serif" style="font-size:2rem;margin-bottom:8px">Spiritual Milestones</h2>
<div><span class="ach-count" id="achUnlocked">0</span> <span class="ach-total">/ <span id="achTotal">30</span> Unlocked</span></div>
<div class="ach-progress-bar"><div class="ach-progress-fill" id="achProgressFill" style="width:0%"></div></div>
</div>
<div class="section-header"><h2 class="section-title serif">Milestones</h2></div>
<div class="ach-grid" id="achMilestones"></div>
<div class="section-header"><h2 class="section-title serif">Streaks</h2></div>
<div class="ach-grid" id="achStreaks"></div>
<div class="section-header"><h2 class="section-title serif">Special</h2></div>
<div class="ach-grid" id="achSpecial"></div>
</section>
</main>

<nav class="tab-nav" id="tabNav" role="tablist">
    <button class="tab-btn active" onclick="switchTab('new-entry')" data-tab="new-entry" role="tab"><span class="tab-icon">✧</span><span>Study</span></button>
    <button class="tab-btn" onclick="switchTab('general')" data-tab="general" role="tab"><span class="tab-icon">✎</span><span>Diary</span></button>
    <button class="tab-btn" onclick="switchTab('journal')" data-tab="journal" role="tab"><span class="tab-icon">📖</span><span>Journal</span></button>
    <button class="tab-btn" onclick="switchTab('progress')" data-tab="progress" role="tab"><span class="tab-icon">✨</span><span>Stats</span></button>
    <button class="tab-btn" onclick="switchTab('chat')" data-tab="chat" role="tab"><span class="tab-icon">💬</span><span>Chat</span></button>
    <button class="tab-btn" onclick="switchTab('prayers')" data-tab="prayers" role="tab"><span class="tab-icon">🙏</span><span>Prayers</span></button>
    <button class="tab-btn" onclick="switchTab('achievements')" data-tab="achievements" role="tab"><span class="tab-icon">🏆</span><span>Awards</span></button>
</nav>
<div class="nav-pull-tab" id="navPullTab"></div>

<button id="chatFab" class="chat-fab" onclick="toggleChat()" title="AI Study Buddy">✧ <span class="chat-badge" id="chatBadge" style="display:none">!</span></button>
<div id="studyChat" class="study-chat" style="display:none">
<div class="chat-header"><span>AI Study Guide</span><button class="chat-close" onclick="toggleChat()" title="Close">✕</button></div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="Ask for insight..." onkeydown="if(event.key==='Enter'){event.preventDefault();handleSendChat('chatInput')}">
    <button type="button" class="btn-primary" style="width:auto;padding:12px 20px" onclick="handleSendChat('chatInput')" id="chatSendBtn">Ask</button>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">✕</button><div id="modalBody"></div></div></div>
<div class="toast-container" id="toastContainer"></div>
<div class="ach-popup" id="achPopup" onclick="closeAchPopup()"><div class="ach-popup-content" onclick="event.stopPropagation()"><div class="ach-popup-icon" id="popupIcon"></div><h3>Achievement Unlocked</h3><h4 id="popupTitle"></h4><p id="popupDesc"></p><button class="btn-primary" onclick="closeAchPopup()">Continue</button></div></div>
<div class="kbd-help" id="kbdHelp">
<div class="kbd-row"><span>Save entry</span><span><kbd>Ctrl</kbd>+<kbd>S</kbd></span></div>
<div class="kbd-row"><span>New entry</span><span><kbd>Ctrl</kbd>+<kbd>N</kbd></span></div>
<div class="kbd-row"><span>Journal</span><span><kbd>Ctrl</kbd>+<kbd>J</kbd></span></div>
<div class="kbd-row"><span>Search</span><span><kbd>Ctrl</kbd>+<kbd>K</kbd></span></div>
<div class="kbd-row"><span>Close modal</span><span><kbd>Esc</kbd></span></div>
</div>
</div>

let currentChatHistory=[];

// ===== UTILITIES =====
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function stripHtml(html){if(!html)return'';const d=document.createElement('div');d.innerHTML=html;return d.textContent||d.innerText||''}
function wc(s){return s?s.trim().split(/\s+/).filter(w=>w.length>0).length:0}
function eWc(e){let t=0;for(const k of Object.keys(e)){if(typeof e[k]==='string'&&!['id','createdAt','title','reference','image','mode'].includes(k)&&!k.startsWith('tag'))t+=wc(stripHtml(e[k]))}return t}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getUniqueDates(entries){const s=new Set();entries.forEach(e=>s.add(dateStr(new Date(e.createdAt))));return Array.from(s).sort()}
function renderContent(text){if(!text)return'';if(/<[a-z][\s\S]*>/i.test(text))return text;return esc(text).replace(/\n/g,'<br>')}
function readTime(words){return Math.max(1,Math.ceil(words/200))}

function getSeenAch(){try{return JSON.parse(localStorage.getItem(ACH_KEY))||[]}catch(e){return[]}}

function getPrayers(){try{return JSON.parse(localStorage.getItem(PRAYER_KEY))||[]}catch(e){return[]}}

function getFavs(){try{return JSON.parse(localStorage.getItem(FAVS_KEY))||[]}catch(e){return[]}}
function setFavs(f){try{localStorage.setItem(FAVS_KEY,JSON.stringify(f))}catch(e){}}
function isFaved(id){return getFavs().includes(id)}
function toggleFav(id,ev){if(ev)ev.stopPropagation();const favs=getFavs();const idx=favs.indexOf(id);if(idx===-1){favs.push(id);showToast('Added to bookmarks','success')}else{favs.splice(idx,1);showToast('Removed from bookmarks','info')}setFavs(favs);renderJournal()}
function getCurrentStreak(entries){const dates=getUniqueDates(entries);if(!dates.length)return 0;const today=new Date();today.setHours(0,0,0,0);let check=new Date(today),ts=dateStr(check);if(!dates.includes(ts)){check.setDate(check.getDate()-1);ts=dateStr(check);if(!dates.includes(ts))return 0}let streak=0;while(dates.includes(dateStr(check))){streak++;check.setDate(check.getDate()-1)}return streak}
function getLongestStreak(entries){const dates=getUniqueDates(entries);if(!dates.length)return 0;let longest=1,current=1;for(let i=1;i<dates.length;i++){const diff=Math.round((new Date(dates[i])-new Date(dates[i-1]))/864e5);if(diff===1){current++;if(current>longest)longest=current}else current=1}return longest}
function getMonthEntries(entries){const now=new Date(),m=now.getMonth(),y=now.getFullYear();const s=new Set();entries.forEach(e=>{const d=new Date(e.createdAt);if(d.getMonth()===m&&d.getFullYear()===y)s.add(dateStr(d))});return s.size}
function getTotalWords(entries){return entries.reduce((t,e)=>t+eWc(e),0)}

function getAllTags(entries){const tags=new Set();entries.forEach(e=>{if(e.tags&&Array.isArray(e.tags))e.tags.forEach(t=>tags.add(t))});return Array.from(tags).sort()}

// ===== SWIPE GESTURES =====
const TAB_ORDER = ['new-entry', 'general', 'journal', 'progress', 'chat', 'prayers', 'achievements'];
let touchStartX = null;
let touchStartY = null;
let touchEndX = null;
let touchEndY = null;

const mainContent = document.querySelector('.main-content');

mainContent.addEventListener('touchstart', e => {
    // Ignore horizontal scrolling areas
    if (e.target.closest('.heatmap-wrapper') || e.target.closest('.tab-nav')) {
        touchStartX = null;
        return;
    }
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

mainContent.addEventListener('touchend', e => {
    if (touchStartX === null) return;
    touchEndX = e.changedTouches[0].screenX;
    touchEndY = e.changedTouches[0].screenY;
    handleSwipe();
}, { passive: true });

function handleSwipe() {
    const swipeThreshold = 50; 
    const diffX = touchStartX - touchEndX;
    const diffY = touchStartY - touchEndY;

    // Check if it's primarily a horizontal swipe
    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > swipeThreshold) {
        const currentTabEl = document.querySelector('.tab-panel.active');
        if (!currentTabEl) return;
        const currentTabId = currentTabEl.id.replace('tab-', '');
        const currentIndex = TAB_ORDER.indexOf(currentTabId);
        
        if (diffX > 0) { // Swiped left -> Go to Next Tab
            if (currentIndex < TAB_ORDER.length - 1) {
                switchTab(TAB_ORDER[currentIndex + 1]);
            }
        } else {         // Swiped right -> Go to Previous Tab
            if (currentIndex > 0) {
                switchTab(TAB_ORDER[currentIndex - 1]);
            }
        }
    }
}

// ===== TABS =====
function switchTab(tab){
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    const panel = document.getElementById('tab-'+tab);
    panel.classList.add('active');

    // Re-trigger stagger animation on glass cards
    panel.querySelectorAll('.glass-card').forEach((c,i)=>{
        c.style.animation = 'none';
        c.offsetHeight; // reflow
        c.style.animation = '';
        c.style.animationDelay = (0.04 + i * 0.06) + 's';
    });

    const btn=document.querySelector(`.tab-btn[data-tab="${tab}"]`);
    if(btn) {
        btn.classList.add('active');
        // Re-trigger icon bounce
        const icon = btn.querySelector('.tab-icon');
        if(icon){ icon.style.animation='none'; icon.offsetHeight; icon.style.animation=''; }
        // Scroll tab into view if partially hidden
        btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
    
    if(tab==='journal')renderJournal();
    if(tab==='progress')renderProgress();
    if(tab==='achievements')renderAchievements();
    if(tab==='prayers')renderPrayers();
    if(tab==='chat') {
        renderChat();
        setTimeout(()=> {
            const m = document.getElementById('tabChatMessages');
            if(m) m.scrollTop = m.scrollHeight;
        }, 10);
    }
    if(tab==='general') {
        const el = document.getElementById('generalDateTime');
        if(el) {
            const opts = { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' };
            el.textContent = new Date().toLocaleDateString('en-US', opts);
        }
    }
}

function rteCmd(cmd){document.execCommand(cmd,false,null)}
function updateWordCount(){let total=0;document.querySelectorAll('.rte-editor').forEach(el=>{total+=wc(stripHtml(el.innerHTML||''))});total+=wc(document.getElementById('entryTitle').value||'');const rt=readTime(total);document.getElementById('totalWordCount').innerHTML=`<span>~${rt} min read</span><span class="wc-total">${total} words</span>`}

function handleTagKey(e){if(e.key==='Enter'||e.key===','){e.preventDefault();const input=document.getElementById('tagInput');const tag=input.value.trim().replace(/,/g,'').toLowerCase();if(tag&&!currentTags.includes(tag)&&currentTags.length<10){currentTags.push(tag);renderTagPills()}input.value=''}else if(e.key==='Backspace'&&!e.target.value&&currentTags.length){currentTags.pop();renderTagPills()}}
function removeTag(tag){currentTags=currentTags.filter(t=>t!==tag);renderTagPills()}
function renderTagPills(){const wrapper=document.getElementById('tagWrapper');wrapper.querySelectorAll('.tag-pill').forEach(p=>p.remove());const input=document.getElementById('tagInput');currentTags.forEach(tag=>{const pill=document.createElement('span');pill.className='tag-pill';pill.innerHTML=`${esc(tag)} <button type="button" onclick="removeTag('${esc(tag)}')">✕</button>`;wrapper.insertBefore(pill,input)})}

function saveDraft(){if(document.getElementById('editingId').value)return;try{const mode=document.getElementById('entryMode').value;const title=document.getElementById('entryTitle').value||'';const reference=document.getElementById('entryRef').value||'';const fields={};let hasContent=false;MODE_FIELDS[mode].forEach(f=>{const el=document.getElementById(f.id);if(el){const c=el.innerHTML||'';fields[f.id]=c;if(stripHtml(c).trim())hasContent=true}});if(!title.trim()&&!reference.trim()&&!hasContent&&!currentImage)return;const draft={mode,title,reference,fields,tags:[...currentTags],timestamp:Date.now()};if(currentImage)draft.image=currentImage;localStorage.setItem(DRAFT_KEY,JSON.stringify(draft))}catch(e){}}
function loadDraft(){try{const raw=localStorage.getItem(DRAFT_KEY);if(!raw)return false;const draft=JSON.parse(raw);if(!draft)return false;const hasContent=draft.title||draft.reference||draft.image||Object.values(draft.fields||{}).some(v=>stripHtml(v||'').trim());if(!hasContent)return false;document.getElementById('entryMode').value=draft.mode||'soap';switchMode();if(draft.title)document.getElementById('entryTitle').value=draft.title;if(draft.reference)document.getElementById('entryRef').value=draft.reference;if(draft.fields){for(const[id,val]of Object.entries(draft.fields)){const el=document.getElementById(id);if(el&&val)el.innerHTML=val}}if(draft.tags&&Array.isArray(draft.tags)){currentTags=draft.tags;renderTagPills()}if(draft.image){currentImage=draft.image;document.getElementById('imgPreviewImg').src=currentImage;document.getElementById('imgPreview').style.display='inline-block';document.getElementById('imgUploadArea').style.display='none'}document.getElementById('draftIndicator').style.display='flex';updateWordCount();return true}catch(e){return false}}

function showVotd(text,ref){document.getElementById('votdText').textContent=`"${text}"`;document.getElementById('votdRef').textContent=`${ref}`;document.getElementById('votdCard').style.display='block';document.getElementById('votdCard').dataset.text=text;document.getElementById('votdCard').dataset.ref=ref}

// ===== MARKDOWN =====
function formatMarkdown(text){if(!text)return'';return text.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}

// ===== UNIFIED CHAT LOGIC =====
function getInitialChat() {
    return [{ role: "model", parts: [{ text: "Fetch a scripture or say hello to begin our study!" }] }];
}

function renderChat() {
    const renderMsg = (msg) => {
        if (msg.role === 'model') {
            const aiHtml = formatMarkdown(msg.parts[0].text);
            return `<div class="chat-msg ai"><div class="ai-text">${aiHtml}</div><button class="save-note-btn" onclick="saveToNotes(this)">Save to Notes</button></div>`;
        } else {
            return `<div class="chat-msg user">${esc(msg.parts[0].text)}</div>`;
        }
    };
    
    let html = '';
    currentChatHistory.forEach(msg => { if (!msg.hideInUI) html += renderMsg(msg); });
    
    const fBox = document.getElementById('chatMessages');
    const tBox = document.getElementById('tabChatMessages');
    
    if(fBox) { fBox.innerHTML = html; fBox.scrollTop = fBox.scrollHeight; }
    if(tBox) { tBox.innerHTML = html; tBox.scrollTop = tBox.scrollHeight; }
}

function clearChat() {
    currentChatHistory = getInitialChat();
    renderChat();
    showToast('Conversation cleared', 'info');
}

async function handleSendChat(inputId) {
    const input = document.getElementById(inputId);
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    
    // Auto-remove default welcome if it's the first message
    if(currentChatHistory.length === 1 && currentChatHistory[0].parts[0].text.includes("Fetch a scripture")) {
        currentChatHistory = [];
    }

    currentChatHistory.push({ role: "user", parts: [{ text }] });
    renderChat();
    
    const btns = [document.getElementById('chatSendBtn'), document.getElementById('tabChatSendBtn')].filter(Boolean);
    btns.forEach(b => { b.disabled = true; b.innerHTML = '...'; });
    
    try {
        // Strip UI-only flags for the backend
        const cleanHistory = currentChatHistory.map(({ role, parts }) => ({ role, parts }));
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ history: cleanHistory, message: text })
        });
        
        const data = await response.json();
        if(!response.ok) throw new Error(data.error);
        
        currentChatHistory.push({ role: "model", parts: [{ text: data.text }] });
        
        if(document.getElementById('studyChat').style.display === 'none' && !document.getElementById('tab-chat').classList.contains('active')) {
            document.getElementById('chatBadge').style.display = 'flex';
        }
        renderChat();
    } catch(e) {
        showToast('Chat connection failed.', 'error');
        console.error(e);
    } finally {
        btns.forEach(b => { b.disabled = false; b.innerHTML = 'Ask'; });
    }
}

function toggleChat(forceOpen=false){const chat=document.getElementById('studyChat');const badge=document.getElementById('chatBadge');if(forceOpen||chat.style.display==='none'){chat.style.display='flex';badge.style.display='none';setTimeout(()=>document.getElementById('chatInput').focus(),100)}else{chat.style.display='none'}}

async function fetchScripture() {
    const ref = document.getElementById('entryRef').value.trim();
    if(!ref) { showToast('Please enter a scripture reference', 'error'); return; }
    const btn = document.getElementById('fetchBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spin">⏳</span>...';
    
    try {
        const response = await fetch(`/api/get-scripture?ref=${encodeURIComponent(ref)}`);
        if(!response.ok) throw new Error("API Error");
        const data = await response.json();
        
        const target = document.getElementById('field_scripture') || document.getElementById('field_highlight') || document.getElementById('field_freewrite');
        if(target) target.innerHTML = data.text;
        
        currentChatHistory = [
            { role: "user", parts: [{ text: `I am studying ${data.reference}. Text: "${data.text}". Context: "${data.context}".` }], hideInUI: true },
            { role: "model", parts: [{ text: `Understood! I'm ready to help you study ${data.reference}. What questions do you have?` }] }
        ];
        
        renderChat();
        toggleChat(true);
        document.getElementById('entryRef').value = data.reference;
        updateWordCount(); showToast('Scripture loaded!', 'success');
    } catch(error) {
        showToast('Could not connect to AI', 'error'); console.error(error);
    } finally {
        btn.disabled = false; btn.innerHTML = 'Fetch';
    }
}

function renderHeatmap(entries){const wrapper=document.getElementById('heatmapWrapper');const today=new Date();today.setHours(0,0,0,0);const counts={};entries.forEach(e=>{const ds=dateStr(new Date(e.createdAt));counts[ds]=(counts[ds]||0)+1});const startDate=new Date(today);startDate.setDate(startDate.getDate()-(52*7)+7-startDate.getDay());const dayNames=['','Mon','','Wed','','Fri',''];const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];let monthHtml='<div class="heatmap-label"></div>';let currentMonth=-1;const d=new Date(startDate);for(let w=0;w<52;w++){const weekStart=new Date(d);weekStart.setDate(weekStart.getDate()+w*7);const m=weekStart.getMonth();if(m!==currentMonth){monthHtml+=`<div class="heatmap-month-label" style="grid-column:span 1">${mn[m]}</div>`;currentMonth=m}else{monthHtml+=`<div class="heatmap-month-label"></div>`}}let gridHtml='';for(let row=0;row<7;row++){gridHtml+=`<div class="heatmap-label">${dayNames[row]}</div>`;for(let w=0;w<52;w++){const cellDate=new Date(startDate);cellDate.setDate(cellDate.getDate()+w*7+row);if(cellDate>today){gridHtml+=`<div class="heatmap-cell empty-cell"></div>`;continue}const ds=dateStr(cellDate);const count=counts[ds]||0;const lvl=count===0?'':count===1?'lvl-1':count===2?'lvl-2':'lvl-3';const isToday=dateStr(today)===ds;const dateLabel=cellDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});gridHtml+=`<div class="heatmap-cell ${lvl} ${isToday?'today':''}"><div class="cell-tooltip"><strong>${dateLabel}</strong><br>${count} entr${count===1?'y':'ies'}</div></div>`}}wrapper.innerHTML=`<div class="heatmap-months">${monthHtml}</div><div class="heatmap-grid">${gridHtml}</div>`}

function renderTimeAnalysis(entries){const bars=document.getElementById('timeBars'),insight=document.getElementById('timeInsight');if(!entries.length){bars.innerHTML='<div style="text-align:center;color:var(--txt3);width:100%;padding:20px">No data yet</div>';insight.innerHTML='';return}const periods=[{label:'12-4a',range:[0,3]},{label:'4-6a',range:[4,5]},{label:'6-8a',range:[6,7]},{label:'8-10a',range:[8,9]},{label:'10-12p',range:[10,11]},{label:'12-2p',range:[12,13]},{label:'2-5p',range:[14,16]},{label:'5-8p',range:[17,19]},{label:'8-10p',range:[20,21]},{label:'10-12a',range:[22,23]}];const periodCounts=periods.map(p=>({...p,count:entries.filter(e=>{const h=new Date(e.createdAt).getHours();return h>=p.range[0]&&h<=p.range[1]}).length}));const maxCount=Math.max(...periodCounts.map(p=>p.count),1);const maxPeriod=periodCounts.reduce((a,b)=>b.count>a.count?b:a);const pct=entries.length>0?Math.round((maxPeriod.count/entries.length)*100):0;bars.innerHTML=periodCounts.map(p=>{const h=p.count>0?Math.max(10,(p.count/maxCount)*100):0;return`<div class="time-bar-wrap ${p.count>0?'active':''}"><div class="time-bar-val">${p.count||''}</div><div class="time-bar-track"><div class="time-bar-fill" style="height:${h}%"></div></div><div class="time-bar-label">${p.label}</div></div>`}).join('');insight.innerHTML=entries.length>=3?`Most consistent during <strong>${maxPeriod.label}</strong> (${pct}%)`:'Complete more entries to see patterns.'}

function renderSingleCloud(containerId,entries,fields,emptyMsg){const cloud=document.getElementById(containerId);const wordCount={};entries.forEach(e=>{const text=fields.map(f=>e[f]).filter(Boolean).map(t=>stripHtml(t)).join(' ');text.toLowerCase().replace(/[^a-zA-Z\s]/g,'').split(/\s+/).filter(w=>w.length>3&&!STOP_WORDS.has(w)).forEach(w=>{wordCount[w]=(wordCount[w]||0)+1})});const sorted=Object.entries(wordCount).sort((a,b)=>b[1]-a[1]).slice(0,20);if(!sorted.length){cloud.innerHTML=`<div style="color:var(--txt3);padding:16px;text-align:center;width:100%;font-size:0.85rem">${emptyMsg}</div>`;return}const max=sorted[0][1],min=sorted[sorted.length-1][1];cloud.innerHTML=sorted.map(([word,count],i)=>{const size=min===max?1.2:0.9+((count-min)/(max-min))*0.8;const op=0.5+((count-min)/(max-min))*0.5;return`<span class="cloud-word" style="font-size:${size}rem;color:var(--pri);opacity:${op}" title="${count}x">${word}</span>`}).join('')}

function renderAchievements(){const entries=getEntries(),stats=getStats(entries);let unlocked=0;const catMap={milestone:'achMilestones',streak:'achStreaks',special:'achSpecial'},html={milestone:'',streak:'',special:''};ACHIEVEMENTS.forEach(a=>{const earned=a.check(entries,stats);if(earned)unlocked++;const p=a.prog(entries,stats);const pct=p.t>0?Math.round(p.c/p.t*100):0;html[a.cat]+=`<div class="glass-card ach-card ${earned?'unlocked':'locked'}"><div class="ach-icon">${a.icon}</div><div class="ach-details"><h4>${a.title}</h4><p>${a.desc}</p><div class="ach-prog"><div class="ach-prog-bar"><div class="ach-prog-fill" style="width:${pct}%"></div></div><span>${p.c}/${p.t}</span></div></div><div class="ach-badge">${earned?'✧':''}</div></div>`});for(const c in catMap)document.getElementById(catMap[c]).innerHTML=html[c];document.getElementById('achUnlocked').textContent=unlocked;document.getElementById('achTotal').textContent=ACHIEVEMENTS.length;document.getElementById('achProgressFill').style.width=Math.round(unlocked/ACHIEVEMENTS.length*100)+'%'}
let achQueue=[];
function checkNewAchievements(entries){const stats=getStats(entries),seen=getSeenAch(),newA=[];ACHIEVEMENTS.forEach(a=>{if(a.check(entries,stats)&&!seen.includes(a.id)){newA.push(a);seen.push(a.id)}});setSeenAch(seen);if(newA.length){achQueue.push(...newA);if(achQueue.length===newA.length)showNextAch()}}

function importData(e){const file=e.target.files[0];if(!file)return;if(!confirm('This will replace ALL your current data. Continue?')){e.target.value='';return}const reader=new FileReader();reader.onload=function(ev){try{const data=JSON.parse(ev.target.result);if(!data||typeof data!=='object')throw new Error();if(data.entries&&Array.isArray(data.entries)){if(!saveEntries(data.entries)){e.target.value='';return}}if(data.prayers&&Array.isArray(data.prayers))savePrayers(data.prayers);if(data.achievements&&Array.isArray(data.achievements))setSeenAch(data.achievements);if(data.favorites&&Array.isArray(data.favorites))setFavs(data.favorites);if(data.theme)localStorage.setItem(THEME_KEY,data.theme);loadTheme();renderJournal();renderProgress();renderAchievements();renderPrayers();renderStreakBanner();showToast('Import successful!','success')}catch(err){showToast('Invalid backup file.','error')}e.target.value=''};reader.readAsText(file)}
function clearAllData(){if(!confirm('Permanently delete ALL data? This cannot be undone.'))return;localStorage.removeItem(ENTRIES_KEY);localStorage.removeItem(PRAYER_KEY);localStorage.removeItem(ACH_KEY);localStorage.removeItem(DRAFT_KEY);localStorage.removeItem(FAVS_KEY);renderJournal();renderProgress();renderAchievements();renderPrayers();renderStreakBanner();showToast('All data cleared.','info')}

// ===== VOICE TRANSCRIPTION (GEMINI) =====
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording(btn, targetId) {
    const targetEditor = document.getElementById(targetId);

    if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        btn.textContent = '⏳';
        btn.style.animation = 'spin 1s linear infinite';
        showToast('Processing audio...', 'info');
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                try {
                    const response = await fetch('/api/transcribe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ audio: base64Audio, mimeType: 'audio/webm' })
                    });
                    if (!response.ok) throw new Error('Transcription failed');
                    const data = await response.json();
                    
                    const currentHtml = targetEditor.innerHTML;
                    const spacer = (currentHtml === '' || currentHtml === '<br>') ? '' : '&nbsp;';
                    targetEditor.innerHTML = currentHtml + spacer + data.text;
                    
                    updateWordCount();
                    showToast('Transcription added!', 'success');
                } catch (error) {
                    console.error('Transcription API Error:', error);
                    showToast('Failed to transcribe audio.', 'error');
                } finally {
                    btn.textContent = '🎙️';
                    btn.style.animation = '';
                    btn.style.color = 'var(--pri)';
                    btn.style.backgroundColor = 'transparent';
                }
            };
            stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        isRecording = true;
        btn.textContent = '⏹️';
        btn.style.color = 'white';
        btn.style.backgroundColor = 'var(--danger)';
        btn.style.borderRadius = '50%';
        
    } catch (err) {
        console.error("Microphone access denied:", err);
        showToast('Microphone access is required.', 'error');
    }
}

// ===== NAV TOGGLE =====
function initNavToggle() {
    const nav = document.getElementById('tabNav') || document.querySelector('.tab-nav');
    const pullTab = document.getElementById('navPullTab');
    if (!nav) return;

    // After the entrance animation finishes, clear it so CSS transitions can take over
    nav.addEventListener('animationend', () => {
        nav.style.animation = 'none';
    }, { once: true });

    const EDGE_ZONE = 30; // px from bottom of screen

    document.addEventListener('touchstart', (e) => {
        const touchY = e.touches[0].clientY;
        if (touchY > window.innerHeight - EDGE_ZONE) {
            nav.classList.toggle('nav-hidden');
            if (pullTab) pullTab.classList.toggle('visible', nav.classList.contains('nav-hidden'));
        }
    }, { passive: true });
}
