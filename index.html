<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<!-- Added viewport-fit=cover for iPhone safe areas -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Devotional Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* --- MODERN MINIMALIST VARIABLES --- */
:root, [data-theme="light"]{
  --bg: #f2f2f7; /* iOS System Gray 6 */
  --bg2: #e5e5ea;
  --card: #ffffff;
  --card-hover: #fafafa;
  --pri: #000000; /* Minimalist dark primary */
  --pri-lt: #333333;
  --pri-dk: #000000;
  --pri-bg: #f4f4f5;
  --acc: #007aff; /* iOS Blue */
  --acc-lt: #e5f1ff;
  --acc-bg: #f0f7ff;
  --txt: #1c1c1e;
  --txt2: #8e8e93;
  --txt3: #c7c7cc;
  --brd: #e5e5ea;
  --success: #34c759;
  --warn: #ff9500;
  --danger: #ff3b30;
  --gold: #ffcc00;
  --gold-dk: #e5b800;
  --sh: 0 2px 10px rgba(0,0,0,.03);
  --sh-lg: 0 10px 30px rgba(0,0,0,.06);
  --rad: 20px; /* Modern large rounded corners */
  --rad-sm: 12px;
  
  /* Pastel/Muted Badge Colors */
  --s-color: #5ac8fa; --o-color: #34c759; --a-color: #ff9500; --p-color: #af52de;
  --h-color: #ff2d55; --e-color: #5856d6; --r-color: #ffcc00;
}
[data-theme="dark"]{
  --bg: #000000; /* True black for OLED screens */
  --bg2: #1c1c1e; /* iOS System Gray 6 (Dark) */
  --card: #1c1c1e;
  --card-hover: #2c2c2e;
  --pri: #ffffff;
  --pri-lt: #e5e5ea;
  --pri-dk: #ffffff;
  --pri-bg: #2c2c2e;
  --acc: #0a84ff;
  --acc-lt: #004080;
  --acc-bg: #002e5c;
  --txt: #f2f2f7;
  --txt2: #8e8e93;
  --txt3: #48484a;
  --brd: #38383a;
  --success: #30d158;
  --warn: #ff9f0a;
  --danger: #ff453a;
  --sh: 0 4px 15px rgba(0,0,0,.3);
  --sh-lg: 0 12px 40px rgba(0,0,0,.5);
}

body{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--txt); line-height:1.5; min-height:100vh; transition:background .3s,color .3s; -webkit-font-smoothing: antialiased;}

/* --- HEADER --- */
.app-header{
  background:var(--bg);
  padding:calc(20px + env(safe-area-inset-top, 0px)) 20px 10px;
  position:relative;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.header-text h1{font-size:1.4rem;font-weight:700;letter-spacing:-0.5px;color:var(--txt);}
.header-text .subtitle{font-size:.85rem;color:var(--txt2);font-weight:400;margin-top:2px;}
.header-controls{display:flex;gap:8px;}
.theme-toggle,.kbd-toggle{background:var(--card);border:1px solid var(--brd);color:var(--txt);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s; box-shadow: var(--sh);}
.theme-toggle:hover,.kbd-toggle:hover{transform:scale(1.05);}

/* --- NAVIGATION --- */
.tab-nav{display:flex;background:var(--bg);position:sticky;top:0;z-index:100;padding: 10px 20px;}
.tab-btn{flex:1;padding:10px 6px;border:none;background:none;cursor:pointer;font-size:.75rem;font-weight:500;color:var(--txt2);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px; border-radius: 12px;}
.tab-btn .tab-icon{font-size:1.3rem; filter: grayscale(1) opacity(0.6); transition: all 0.2s;}
.tab-btn:hover{color:var(--pri);background:var(--pri-bg);}
.tab-btn.active{color:var(--pri);font-weight:600;}
.tab-btn.active .tab-icon{filter: grayscale(0) opacity(1);}

/* --- MAIN CONTENT --- */
.main-content{max-width:900px;margin:0 auto;padding:10px 16px 80px;}
.tab-panel{display:none;animation:fadeIn .3s ease;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* --- UI COMPONENTS --- */
.streak-banner{background:var(--card);border-radius:var(--rad);padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh); border: 1px solid var(--brd);}
.streak-banner .streak-flame{font-size:1.8rem;}
.streak-info{flex:1;}
.streak-info strong{color:var(--pri);font-size:1rem; font-weight: 600;}
.streak-info p{font-size:.85rem;color:var(--txt2);margin-top:2px;}
.streak-dismiss{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--txt3);}

.votd-card{background:var(--card);border-radius:var(--rad);padding:20px;margin-bottom:20px;box-shadow:var(--sh); border: 1px solid var(--brd);}
.votd-label{font-size:.7rem;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.votd-text{font-size:1.05rem;font-style:italic;color:var(--txt);line-height:1.5;margin-bottom:12px;}
.votd-ref{font-size:.85rem;font-weight:600;color:var(--txt2);text-align:right;}
.votd-btn{margin-top:14px;padding:8px 16px;background:var(--pri-bg);color:var(--pri);border:none;border-radius:99px;font-size:.8rem; font-weight: 600; cursor:pointer;}

/* Layout */
.entry-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;}
@media(max-width:850px){.entry-layout{grid-template-columns:1fr}}

/* Forms & Inputs */
.entry-form-wrapper{background:var(--card);border-radius:var(--rad);box-shadow:var(--sh);padding:24px; border: 1px solid var(--brd);}
.entry-form-wrapper h2{font-size:1.2rem;font-weight:700;margin-bottom:16px;color:var(--txt);}
.form-group{margin-bottom:20px;}
.form-group label{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;margin-bottom:8px;color:var(--txt);}
input[type="text"],input[type="search"],textarea,select{
  width:100%;padding:14px 16px;background:var(--bg);border:1px solid transparent;
  border-radius:var(--rad-sm);font-size:.95rem;font-family:inherit;color:var(--txt);transition:all .2s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc);background:var(--card);}
textarea{resize:vertical;min-height:100px;}
.ref-row{display:flex;gap:8px;}
.ref-row input{flex:1;}

/* Badges */
.soap-badge{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#fff;}
.soap-badge.sb-s{background:var(--s-color)}.soap-badge.sb-o{background:var(--o-color)}
.soap-badge.sb-a{background:var(--a-color)}.soap-badge.sb-p{background:var(--p-color)}
.soap-badge.sb-h{background:var(--h-color)}.soap-badge.sb-e{background:var(--e-color)}
.soap-badge.sb-r{background:var(--r-color)}

/* Buttons */
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--pri);color:var(--card);border:none;border-radius:99px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%;justify-content:center;}
.btn-primary:active{transform:scale(0.98);}
.fetch-btn{padding:0 20px;background:var(--pri);color:var(--card);border:none;border-radius:var(--rad-sm);font-size:.85rem;cursor:pointer;white-space:nowrap;font-weight:600;}
.btn-danger{padding:8px 16px;background:var(--danger);color:#fff;border:none;border-radius:99px;font-size:.85rem;font-weight:600;}
.btn-secondary{padding:8px 16px;background:var(--pri-bg);color:var(--txt);border:none;border-radius:99px;font-size:.85rem;font-weight:600;}
.btn-edit{padding:8px 16px;background:var(--acc-bg);color:var(--acc);border:none;border-radius:99px;font-size:.85rem;font-weight:600;}

/* File Upload */
.img-upload-area{border:1px dashed var(--brd);background:var(--bg);border-radius:var(--rad-sm);padding:24px;text-align:center;position:relative; cursor: pointer;}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-upload-area .upload-icon{font-size:24px;margin-bottom:8px;}
.img-upload-area p{font-size:.85rem;color:var(--txt2);}
.img-preview{margin-top:10px;position:relative;display:inline-block;}
.img-preview img{max-width:100%;max-height:200px;border-radius:var(--rad-sm);}
.img-preview .remove-img{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;}

/* Tags Input */
.tag-input-wrapper{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:var(--bg);border-radius:var(--rad-sm);min-height:46px;align-items:center; cursor:text;}
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;background:var(--card);color:var(--txt);border: 1px solid var(--brd); border-radius:12px;font-size:.8rem;font-weight:500;}
.tag-pill button{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:.9rem;padding:0;}
.tag-input{border:none;outline:none;background:transparent;color:var(--txt);min-width:100px;flex:1;font-size:.9rem;}

/* Journal List */
.journal-header{display:flex;flex-direction: column;gap:12px;margin-bottom:20px;}
.journal-header h2{font-size:1.4rem;font-weight:700;color:var(--txt);}
.journal-controls{display:flex;gap:8px;flex-wrap:wrap;}
.journal-controls input{flex: 1; min-width: 200px;}
.journal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.journal-card{background:var(--card);border-radius:var(--rad);padding:20px;cursor:pointer; border: 1px solid var(--brd); position:relative; box-shadow: var(--sh);}
.journal-card:hover{box-shadow: var(--sh-lg);}
.journal-card.is-faved::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--warn);border-radius:var(--rad) 0 0 var(--rad);}
.journal-card h3{font-size:1.05rem;font-weight:600;color:var(--txt);margin-bottom:6px;padding-right:40px;}
.journal-card .card-meta{font-size:.8rem;color:var(--txt2);margin-bottom:10px;display:flex;gap:10px; flex-wrap:wrap;}
.journal-card .card-preview{font-size:.9rem;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-delete{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.1rem;color:var(--txt3);cursor:pointer;}
.fav-btn{position:absolute;top:16px;right:44px;background:none;border:none;font-size:1.2rem;color:var(--txt3);cursor:pointer;}
.fav-btn.faved{color:var(--warn);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(5px);}
.modal-overlay.show{display:flex;}
.modal-content{background:var(--card);border-radius:var(--rad);max-width:600px;width:100%;max-height:85vh;overflow-y:auto;position:relative;box-shadow:var(--sh-lg);}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg);border:none;font-size:1.2rem;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--txt);}
.modal-body{padding:24px;}
.modal-body h2{font-size:1.4rem;font-weight:700;margin-bottom:12px; padding-right: 30px;}
.modal-meta{font-size:.85rem;color:var(--txt2);display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.modal-section{margin-bottom:20px;}
.modal-section h3{font-size:.95rem;font-weight:600;margin-bottom:8px; display:flex; align-items:center; gap:8px;}
.modal-actions{display:flex;gap:10px;padding-top:20px;border-top:1px solid var(--brd);flex-wrap:wrap; justify-content: flex-end;}

/* Progress & Heatmap */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border-radius:var(--rad);padding:20px;text-align:center;border:1px solid var(--brd);}
.stat-card .stat-value{font-size:2rem;font-weight:700;color:var(--pri);line-height:1;margin:8px 0 4px;}
.stat-card .stat-label{font-size:.8rem;color:var(--txt2);font-weight:500;}

.heatmap-wrapper{overflow-x:auto;}
.heatmap-grid{display:grid;grid-template-columns:auto repeat(52,1fr);gap:4px;min-width:700px;}
.heatmap-cell{width:12px;height:12px;border-radius:4px;background:var(--bg);position:relative;}
.heatmap-cell.lvl-1{background:#a2d5f2;}
.heatmap-cell.lvl-2{background:#4ea8de;}
.heatmap-cell.lvl-3{background:#0077b6;}

/* RTE */
.rte-wrapper{border:1px solid var(--brd);border-radius:var(--rad-sm);background:var(--bg);overflow:hidden;}
.rte-wrapper:focus-within{border-color:var(--acc); background:var(--card);}
.rte-toolbar{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--brd);}
.rte-toolbar button{padding:6px 12px;background:var(--card);border:1px solid var(--brd);border-radius:8px;font-size:.8rem;cursor:pointer;}
.rte-editor{padding:16px;min-height:100px;font-size:.95rem;outline:none;}
.rte-editor:empty::before{content:attr(data-placeholder);color:var(--txt3);pointer-events:none;}

/* Prayers */
.prayer-input-row{display:flex;gap:8px;margin-bottom:20px;}
.prayer-input-row input{flex:1;}
.prayer-item{display:flex;gap:12px;padding:16px;border-radius:var(--rad-sm);background:var(--card);margin-bottom:10px;border:1px solid var(--brd);}
.prayer-checkbox{width:24px;height:24px;border:2px solid var(--brd);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prayer-checkbox.checked{background:var(--success);border-color:var(--success);color:#fff;font-size:.8rem;}

/* Chat Widget */
.study-chat{
  position:fixed;bottom:90px;right:20px;width:350px;max-width:calc(100vw - 40px);height:500px;
  background:var(--card);border-radius:var(--rad);box-shadow:var(--sh-lg);border:1px solid var(--brd);
  display:flex;flex-direction:column;z-index:900;overflow:hidden;
}
.chat-header{background:var(--bg);padding:14px 16px;font-weight:600;display:flex;justify-content:space-between;border-bottom:1px solid var(--brd);}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:.9rem;}
.chat-msg.user{align-self:flex-end;background:var(--pri);color:var(--bg);border-bottom-right-radius:4px;}
.chat-msg.ai{align-self:flex-start;background:var(--bg);color:var(--txt);border-bottom-left-radius:4px;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--brd);background:var(--card);}
.chat-fab{
  position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;
  background:var(--pri);color:var(--bg);border:none;box-shadow:var(--sh-lg);font-size:1.5rem;
  cursor:pointer;z-index:901;display:flex;align-items:center;justify-content:center;
}
.save-note-btn{margin-top:8px;padding:6px 12px;background:var(--card);border:1px solid var(--brd);border-radius:99px;font-size:.75rem;cursor:pointer;}

/* Toasts */
.toast-container{position:fixed;top:env(safe-area-inset-top, 20px);right:20px;z-index:3000;display:flex;flex-direction:column;gap:10px;}
.toast{padding:14px 20px;border-radius:99px;font-size:.9rem;font-weight:500;color:#fff;background:var(--pri);box-shadow:var(--sh-lg);animation:toastIn .3s ease,toastOut .3s ease 2.6s forwards;}

/* Mobile Optimization for iPhone 16 Pro and similar */
@media(max-width:850px){
  .tab-nav{
    position:fixed; bottom:0; left:0; right:0; top:auto;
    background:rgba(255,255,255,0.85); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--brd); padding:10px 10px calc(10px + env(safe-area-inset-bottom, 20px));
  }
  [data-theme="dark"] .tab-nav { background:rgba(28,28,30,0.85); }
  .main-content{padding-bottom:calc(100px + env(safe-area-inset-bottom, 20px));}
  .study-chat{bottom:calc(85px + env(safe-area-inset-bottom, 20px)); right:16px; width:calc(100vw - 32px);}
  .chat-fab{bottom:calc(85px + env(safe-area-inset-bottom, 20px)); right:16px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .header-text h1{font-size: 1.25rem;}
}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-text">
      <h1>Devotional Tracker</h1>
      <p class="subtitle">Walk faithfully · Grow daily</p>
    </div>
    <div class="header-controls">
      <button class="kbd-toggle" onclick="toggleKbdHelp()" title="Keyboard Shortcuts">⌨️</button>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle Dark Mode">🌙</button>
    </div>
  </header>

  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" onclick="switchTab('new-entry')" data-tab="new-entry"><span class="tab-icon">✍️</span><span>Entry</span></button>
    <button class="tab-btn" onclick="switchTab('journal')" data-tab="journal"><span class="tab-icon">📖</span><span>Journal</span></button>
    <button class="tab-btn" onclick="switchTab('progress')" data-tab="progress"><span class="tab-icon">📊</span><span>Progress</span></button>
    <button class="tab-btn" onclick="switchTab('prayers')" data-tab="prayers"><span class="tab-icon">🙏</span><span>Prayers</span></button>
  </nav>

  <main class="main-content">
    <!-- NEW ENTRY -->
    <section id="tab-new-entry" class="tab-panel active" role="tabpanel">
      <div id="streakBanner"></div>
      
      <div class="entry-layout">
        <div class="entry-form-wrapper">
          <h2 id="formHeading">New Journal Entry</h2>
          
          <div class="form-group" style="display: flex; gap: 10px; align-items: center;">
            <select id="entryMode" onchange="switchMode()" style="width:auto; padding: 10px 16px;">
              <option value="soap">SOAP Method</option>
              <option value="hear">H.E.A.R. Method</option>
              <option value="free">Free Write</option>
            </select>
          </div>

          <form id="entryForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="editingId" value="">
            <div class="form-group">
              <label for="entryTitle">Title</label>
              <input type="text" id="entryTitle" placeholder="Finding Peace..." required>
            </div>
            <div class="form-group">
              <label for="entryRef">Scripture Reference</label>
              <div class="ref-row">
                <input type="text" id="entryRef" placeholder="e.g. Philippians 4:6-7">
                <button type="button" class="fetch-btn" onclick="fetchScripture()" id="fetchBtn">Fetch</button>
              </div>
            </div>
            
            <div id="dynamicFields"></div>
            
            <div class="form-group">
              <label>Tags</label>
              <div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tagInput').focus()">
                <input type="text" class="tag-input" id="tagInput" placeholder="Add tag..." onkeydown="handleTagKey(event)">
              </div>
            </div>
            
            <div class="form-group">
              <label>Photo</label>
              <div class="img-upload-area" id="imgUploadArea">
                <input type="file" accept="image/*" onchange="handleImageUpload(event)" id="imgInput">
                <div class="upload-icon">📷</div>
                <p>Tap to attach</p>
              </div>
              <div id="imgPreview" class="img-preview" style="display:none">
                <img id="imgPreviewImg" src="" alt="preview">
                <button type="button" class="remove-img" onclick="removeImage()">×</button>
              </div>
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">Save Entry</button>
            <button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none;width:100%;margin-top:10px;" onclick="cancelEdit()">Cancel</button>
          </form>
        </div>
      </div>
    </section>

    <!-- JOURNAL -->
    <section id="tab-journal" class="tab-panel" role="tabpanel">
      <div class="journal-header">
        <h2>Journal Entries</h2>
        <div class="journal-controls">
          <input type="search" id="journalSearch" placeholder="Search..." oninput="renderJournal()">
          <select id="journalMode" onchange="renderJournal()">
            <option value="all">All Modes</option>
            <option value="soap">SOAP</option>
            <option value="hear">H.E.A.R.</option>
            <option value="free">Free Write</option>
          </select>
        </div>
      </div>
      <div id="journalTagFilters" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;"></div>
      <div id="journalList" class="journal-grid"></div>
      <div id="emptyJournal" style="display:none; text-align:center; padding: 40px; color:var(--txt3);">
        <div style="font-size:3rem; margin-bottom:10px;">📝</div>
        <p>No entries yet.</p>
      </div>
    </section>

    <!-- PROGRESS -->
    <section id="tab-progress" class="tab-panel" role="tabpanel">
      <h2 style="font-size:1.4rem; font-weight:700; margin-bottom:20px;">Progress</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Entries</div></div>
        <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Day Streak</div></div>
        <div class="stat-card"><div class="stat-value" id="statWords">0</div><div class="stat-label">Words Written</div></div>
      </div>
      <div class="entry-form-wrapper" style="margin-bottom:20px; padding: 20px;">
        <h3 style="font-size:1rem; margin-bottom:16px;">Activity Heatmap</h3>
        <div class="heatmap-wrapper" id="heatmapWrapper"></div>
      </div>
      
      <div class="entry-form-wrapper" style="padding:20px;">
        <h3 style="font-size:1rem; margin-bottom:16px;">Data Management</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn-secondary" onclick="exportData()">Export Backup</button>
          <label class="btn-primary" style="width:auto; cursor:pointer;">Import Backup<input type="file" accept=".json" onchange="importData(event)" style="display:none;"></label>
          <button class="btn-danger" onclick="clearAllData()">Clear Data</button>
        </div>
      </div>
    </section>

    <!-- PRAYERS -->
    <section id="tab-prayers" class="tab-panel" role="tabpanel">
      <h2 style="font-size:1.4rem; font-weight:700; margin-bottom:20px;">Prayer Requests</h2>
      <div class="prayer-input-row">
        <input type="text" id="prayerInput" placeholder="Enter prayer request..." onkeydown="if(event.key==='Enter'){event.preventDefault();addPrayer()}">
        <button class="btn-primary" style="width:auto; padding: 0 20px;" onclick="addPrayer()">Add</button>
      </div>
      <div style="display:flex; gap:8px; margin-bottom:20px;">
        <button class="btn-secondary" onclick="setPrayerFilter('all',this)">All</button>
        <button class="btn-secondary" onclick="setPrayerFilter('active',this)" style="background:transparent; border:1px solid var(--brd);">Active</button>
        <button class="btn-secondary" onclick="setPrayerFilter('answered',this)" style="background:transparent; border:1px solid var(--brd);">Answered</button>
      </div>
      <div id="prayerList"></div>
    </section>
  </main>

  <!-- FLOATING CHAT WIDGET -->
  <button id="chatFab" class="chat-fab" onclick="toggleChat()" title="AI Study Buddy">💬</button>

  <div id="studyChat" class="study-chat" style="display:none">
    <div class="chat-header">
      <span>AI Study Buddy</span>
      <button onclick="toggleChat()" style="background:none;border:none;color:var(--txt);font-size:1.5rem;cursor:pointer;">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div style="text-align:center;color:var(--txt3);font-size:0.85rem;margin-top:auto;margin-bottom:auto;">
        Fetch a scripture to start studying!
      </div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Ask a question..." style="padding:10px; border-radius:12px; background:var(--bg);" onkeydown="if(event.key==='Enter'){event.preventDefault();sendChatMessage()}">
      <button type="button" class="btn-primary" style="width:auto;padding:0 16px;" onclick="sendChatMessage()" id="chatSendBtn">Send</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
let currentChatHistory = [];
const ENTRIES_KEY='dt_entries', PRAYER_KEY='dt_prayers', THEME_KEY='dt_theme', DRAFT_KEY='dt_draft', FAVS_KEY='dt_favs';
let currentImage=null; let currentTags=[]; let activeTagFilter=null;

const MODE_FIELDS={
  soap:[
    {id:'field_scripture',label:'Scripture',badge:'sb-s',letter:'S',placeholder:'Write out the scripture...'},
    {id:'field_observation',label:'Observation',badge:'sb-o',letter:'O',placeholder:'What stands out?'},
    {id:'field_application',label:'Application',badge:'sb-a',letter:'A',placeholder:'How does this apply?'},
    {id:'field_prayer',label:'Prayer',badge:'sb-p',letter:'P',placeholder:'Write a prayer...'},
    {id:'field_notes',label:'Notes',badge:'',letter:'📝',placeholder:'Optional insights...'}
  ],
  hear:[
    {id:'field_highlight',label:'Highlight',badge:'sb-h',letter:'H',placeholder:'Highlight the verse...'},
    {id:'field_explain',label:'Explain',badge:'sb-e',letter:'E',placeholder:'Explain what it means...'},
    {id:'field_apply',label:'Apply',badge:'sb-a',letter:'A',placeholder:'Apply it to your life...'},
    {id:'field_respond',label:'Respond',badge:'sb-r',letter:'R',placeholder:'Write a prayer...'},
    {id:'field_notes',label:'Notes',badge:'',letter:'📝',placeholder:'Optional insights...'}
  ],
  free:[
    {id:'field_freewrite',label:'Thoughts',badge:'',letter:'✏️',placeholder:'Write freely...'},
    {id:'field_notes',label:'Notes',badge:'',letter:'📝',placeholder:'Optional insights...'}
  ]
};

// Utils
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function stripHtml(html){if(!html)return'';const d=document.createElement('div');d.innerHTML=html;return d.textContent||d.innerText||''}
function wc(s){return s?s.trim().split(/\s+/).filter(w=>w.length>0).length:0}
function eWc(e){let t=0;for(const k of Object.keys(e)){if(typeof e[k]==='string'&&!['id','createdAt','title','reference','image','mode'].includes(k)&&!k.startsWith('tag'))t+=wc(stripHtml(e[k]))}return t}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// Data Handling
function getEntries(){try{return JSON.parse(localStorage.getItem(ENTRIES_KEY))||[]}catch(e){return[]}}
function saveEntries(e){try{localStorage.setItem(ENTRIES_KEY,JSON.stringify(e));return true}catch(err){showToast('Storage full!','error');return false}}
function getPrayers(){try{return JSON.parse(localStorage.getItem(PRAYER_KEY))||[]}catch(e){return[]}}
function savePrayers(p){try{localStorage.setItem(PRAYER_KEY,JSON.stringify(p));return true}catch(err){return false}}
function getFavs(){try{return JSON.parse(localStorage.getItem(FAVS_KEY))||[]}catch(e){return[]}}
function setFavs(f){try{localStorage.setItem(FAVS_KEY,JSON.stringify(f))}catch(e){}}

// Theme
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem(THEME_KEY,isDark?'light':'dark');
}
function loadTheme(){
  const t=localStorage.getItem(THEME_KEY)||'light';
  document.documentElement.setAttribute('data-theme',t);
}

// Navigation
function switchTab(tab){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  if(tab==='journal')renderJournal();
  if(tab==='progress')renderProgress();
  if(tab==='prayers')renderPrayers();
}

// Editor
function switchMode(){
  const mode=document.getElementById('entryMode').value;
  const fields=MODE_FIELDS[mode];
  document.getElementById('dynamicFields').innerHTML=fields.map(f=>`
    <div class="form-group">
      <label>${f.badge?`<span class="soap-badge ${f.badge}">${f.letter}</span>`:f.letter} ${f.label}</label>
      <div class="rte-wrapper">
        <div class="rte-toolbar">
          <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('bold',false,null)">B</button>
          <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('italic',false,null)">I</button>
          <button type="button" onmousedown="event.preventDefault()" onclick="document.execCommand('insertUnorderedList',false,null)">List</button>
        </div>
        <div class="rte-editor" contenteditable="true" id="${f.id}" data-placeholder="${f.placeholder}"></div>
      </div>
    </div>`).join('');
}

// Fetch Scripture & AI Priming (Context NO LONGER pasted into notes)
async function fetchScripture(){
  const ref=document.getElementById('entryRef').value.trim();
  if(!ref){showToast('Enter a reference first','error');return}
  const btn=document.getElementById('fetchBtn'); btn.disabled=true; btn.textContent='...';
  try {
    const response = await fetch(`/api/get-scripture?ref=${encodeURIComponent(ref)}`);
    if (!response.ok) throw new Error("API Network Error");
    const data = await response.json();

    const target = document.getElementById('field_scripture') || document.getElementById('field_highlight') || document.getElementById('field_freewrite');
    if(target) target.innerHTML = data.text;

    // Secretly prime AI without pasting historical context into the UI notes field
    currentChatHistory = [
        { role: "user", parts: [{ text: `I am studying ${data.reference}. The text is: "${data.text}". The historical context is: "${data.context}". I will ask you follow-up questions about this.` }] },
        { role: "model", parts: [{ text: `Understood! I'm ready to help you study ${data.reference}. What questions do you have?` }] }
    ];
    
    document.getElementById('chatMessages').innerHTML = `<div class="chat-msg ai">I am ready to help you study ${data.reference}! Ask me anything.</div>`;
    document.getElementById('entryRef').value = data.reference;
    showToast('✨ Scripture loaded!');
  } catch (error) {
    showToast('Could not fetch data', 'error');
  } finally {
    btn.disabled=false; btn.textContent='Fetch';
  }
}

// Chat functions
function toggleChat(){
  const chat = document.getElementById('studyChat');
  chat.style.display = chat.style.display === 'none' ? 'flex' : 'none';
}
async function sendChatMessage(){
  const input=document.getElementById('chatInput'); const text=input.value.trim();
  if(!text) return;
  const msgBox=document.getElementById('chatMessages');
  if(currentChatHistory.length===0) currentChatHistory=[{role:"user",parts:[{text:"Help me study."}]},{role:"model",parts:[{text:"Sure!"}]}];
  msgBox.innerHTML+=`<div class="chat-msg user">${esc(text)}</div>`;
  input.value=''; msgBox.scrollTop=msgBox.scrollHeight;
  const btn=document.getElementById('chatSendBtn'); btn.disabled=true;
  try{
    const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ history: currentChatHistory, message: text }) });
    const data = await response.json();
    msgBox.innerHTML+=`<div class="chat-msg ai"><div class="ai-text">${data.text.replace(/\n/g,'<br>')}</div><button class="save-note-btn" onclick="saveToNotes(this)">Save to Notes</button></div>`;
    currentChatHistory.push({role:"user",parts:[{text}]}); currentChatHistory.push({role:"model",parts:[{text:data.text}]});
    msgBox.scrollTop=msgBox.scrollHeight;
  }catch(e){ showToast('Chat error','error'); }
  btn.disabled=false;
}
function saveToNotes(btn){
  const text=btn.parentElement.querySelector('.ai-text').innerHTML;
  const notesBox=document.getElementById('field_notes');
  if(notesBox){ notesBox.innerHTML+=`<br><br><strong>AI Insight:</strong><br>${text}`; showToast('Saved to notes'); }
}

// Entry Management
function saveEntry(e){
  e.preventDefault(); const mode=document.getElementById('entryMode').value;
  const editId=document.getElementById('editingId').value;
  const entry={
    id:editId?parseInt(editId):Date.now(), createdAt:new Date().toISOString(), mode,
    title:document.getElementById('entryTitle').value.trim(), reference:document.getElementById('entryRef').value.trim(), tags:[...currentTags]
  };
  MODE_FIELDS[mode].forEach(f=>{const el=document.getElementById(f.id);if(el)entry[f.id.replace('field_','')]=(el.innerHTML||'').trim()});
  if(currentImage) entry.image=currentImage;
  const entries=getEntries();
  if(editId){ const idx=entries.findIndex(x=>x.id===parseInt(editId)); if(idx!==-1){entry.createdAt=entries[idx].createdAt;entries[idx]=entry} }
  else entries.push(entry);
  if(saveEntries(entries)){ showToast('Saved!'); document.getElementById('entryForm').reset(); document.querySelectorAll('.rte-editor').forEach(el=>el.innerHTML=''); removeImage(); }
}
function renderJournal(){
  const entries=getEntries(); const list=document.getElementById('journalList');
  if(!entries.length){ list.innerHTML=''; document.getElementById('emptyJournal').style.display='block'; return;}
  document.getElementById('emptyJournal').style.display='none';
  list.innerHTML=entries.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(e=>`
    <div class="journal-card" onclick="viewEntry(${e.id})">
      <button class="card-delete" onclick="event.stopPropagation();deleteEntry(${e.id})">🗑️</button>
      <h3>${esc(e.title)}</h3>
      <div class="card-meta"><span>${new Date(e.createdAt).toLocaleDateString()}</span><span>${e.mode.toUpperCase()}</span></div>
      <p class="card-preview">${esc((e.observation||e.freewrite||e.highlight||'').replace(/<[^>]*>?/gm, ''))}</p>
    </div>
  `).join('');
}
function viewEntry(id){
  const e=getEntries().find(x=>x.id===id); if(!e) return;
  let html=`<h2>${esc(e.title)}</h2><div class="modal-meta"><span>${new Date(e.createdAt).toLocaleDateString()}</span><span>${e.reference}</span></div>`;
  MODE_FIELDS[e.mode||'soap'].forEach(f=>{ const val=e[f.id.replace('field_','')]; if(val) html+=`<div class="modal-section"><h3>${f.label}</h3><div>${val}</div></div>`; });
  document.getElementById('modalBody').innerHTML=html; document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
function deleteEntry(id){if(confirm('Delete?')){saveEntries(getEntries().filter(e=>e.id!==id));renderJournal();}}

// Image Handling
function handleImageUpload(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader(); reader.onload=ev=>{
    const img=new Image(); img.onload=()=>{
      const canvas=document.createElement('canvas'); let w=img.width,h=img.height; const max=800;
      if(w>max){h=Math.round(h*max/w);w=max} canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h); currentImage=canvas.toDataURL('image/jpeg',0.7);
      document.getElementById('imgPreviewImg').src=currentImage; document.getElementById('imgPreview').style.display='inline-block';
      document.getElementById('imgUploadArea').style.display='none';
    }; img.src=ev.target.result;
  }; reader.readAsDataURL(file);
}
function removeImage(){currentImage=null;document.getElementById('imgPreview').style.display='none';document.getElementById('imgUploadArea').style.display='';document.getElementById('imgInput').value=''}

// Progress & Stats
function renderProgress(){
  const entries=getEntries();
  document.getElementById('statTotal').textContent=entries.length;
  document.getElementById('statWords').textContent=entries.reduce((acc,e)=>acc+eWc(e),0);
  renderHeatmap(entries);
}
function renderHeatmap(entries){
  const wrapper=document.getElementById('heatmapWrapper');
  const counts={}; entries.forEach(e=>{counts[dateStr(new Date(e.createdAt))]=(counts[dateStr(new Date(e.createdAt))]||0)+1});
  const today=new Date(); today.setHours(0,0,0,0);
  const startDate=new Date(today); startDate.setDate(startDate.getDate()-(52*7)+7-startDate.getDay());
  let gridHtml='';
  for(let row=0;row<7;row++){
    for(let w=0;w<52;w++){
      const d=new Date(startDate); d.setDate(d.getDate()+w*7+row);
      if(d>today) gridHtml+=`<div class="heatmap-cell" style="background:transparent;"></div>`;
      else{ const c=counts[dateStr(d)]||0; gridHtml+=`<div class="heatmap-cell ${c?c>2?'lvl-3':c>1?'lvl-2':'lvl-1':''}"></div>`; }
    }
  }
  wrapper.innerHTML=`<div class="heatmap-grid" style="grid-template-columns:repeat(52,1fr)">${gridHtml}</div>`;
}

// Prayers
let prayerFilter='all';
function addPrayer(){
  const input=document.getElementById('prayerInput'); const text=input.value.trim();
  if(!text)return;
  const prayers=getPrayers(); prayers.push({id:Date.now(),text,createdAt:new Date().toISOString(),answered:false});
  savePrayers(prayers); input.value=''; renderPrayers();
}
function renderPrayers(){
  let prayers=getPrayers();
  if(prayerFilter==='active') prayers=prayers.filter(p=>!p.answered);
  if(prayerFilter==='answered') prayers=prayers.filter(p=>p.answered);
  document.getElementById('prayerList').innerHTML=prayers.sort((a,b)=>b.id-a.id).map(p=>`
    <div class="prayer-item">
      <div class="prayer-checkbox ${p.answered?'checked':''}" onclick="togglePrayer(${p.id})">${p.answered?'✓':''}</div>
      <div style="flex:1;">
        <div style="${p.answered?'text-decoration:line-through;color:var(--txt3);':''}">${esc(p.text)}</div>
      </div>
      <button onclick="deletePrayer(${p.id})" style="background:none;border:none;color:var(--txt3);">🗑️</button>
    </div>
  `).join('');
}
function togglePrayer(id){const p=getPrayers(); const idx=p.findIndex(x=>x.id===id); if(idx>-1){p[idx].answered=!p[idx].answered; savePrayers(p); renderPrayers();}}
function deletePrayer(id){savePrayers(getPrayers().filter(p=>p.id!==id)); renderPrayers();}
function setPrayerFilter(f,btn){prayerFilter=f; document.querySelectorAll('#tab-prayers .btn-secondary').forEach(b=>{b.style.background='transparent'; b.style.border='1px solid var(--brd)'}); btn.style.background='var(--pri-bg)'; btn.style.border='none'; renderPrayers();}

// Toast & Init
function showToast(msg, type='info'){
  const c=document.getElementById('toastContainer'); const t=document.createElement('div');
  t.className=`toast`; t.textContent=msg; if(type==='error')t.style.background='var(--danger)';
  c.appendChild(t); setTimeout(()=>t.remove(), 3000);
}
function exportData(){
  const data=JSON.stringify({entries:getEntries(),prayers:getPrayers()});
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data])); a.download='backup.json'; a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader(); reader.onload=ev=>{
    try{ const d=JSON.parse(ev.target.result); if(d.entries)saveEntries(d.entries); if(d.prayers)savePrayers(d.prayers); showToast('Imported!'); setTimeout(()=>location.reload(),1000); }catch(e){showToast('Error','error');}
  }; reader.readAsText(file);
}
function clearAllData(){if(confirm('Clear all data?')){localStorage.clear();location.reload();}}

(function init(){loadTheme(); switchMode(); renderJournal();})();
</script>
</body>
</html>
